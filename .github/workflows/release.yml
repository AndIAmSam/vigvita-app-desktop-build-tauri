name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install
        working-directory: ./app

      - name: build frontend
        run: npx expo export -p web
        working-directory: ./app
        env:
          EXPO_PUBLIC_API_URL: "http://localhost:8080"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Vigvita App v__VERSION__"
          releaseBody: "Vigvita App v__VERSION__ release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  rewrite-update-urls:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rewrite latest.json URLs to server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_TAG="app-v${VERSION}"

          echo "Downloading latest.json from release ${RELEASE_TAG}..."
          gh release download "${RELEASE_TAG}" -p "latest.json" -R "${{ github.repository }}"

          echo "Before rewrite:"
          cat latest.json

          GITHUB_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          SERVER_URL="https://vigvita.com.mx/app/u"
          sed -i "s|${GITHUB_URL}|${SERVER_URL}|g" latest.json

          echo "After rewrite:"
          cat latest.json

          gh release delete-asset "${RELEASE_TAG}" "latest.json" -R "${{ github.repository }}" -y
          gh release upload "${RELEASE_TAG}" "latest.json" -R "${{ github.repository }}"
          echo "Done! latest.json URLs now point to server."
