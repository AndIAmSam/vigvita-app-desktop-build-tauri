name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install
        working-directory: ./app

      - name: build frontend
        run: npx expo export -p web
        working-directory: ./app

        # --- NUEVO PASO DE FIRMADO AD-HOC ---
      - name: Build and Ad-Hoc Sign (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # 1. Instalamos el CLI de Tauri globalmente para tener control
          npm install -g @tauri-apps/cli
          
          # 2. Compilamos solo el bundle .app (sin crear el DMG todavía)
          # Ajusta el path si tu carpeta de tauri no está en ./app/src-tauri
          cd app && tauri build --target aarch64-apple-darwin --bundles app
          
          # 3. Firmamos el .app de forma recursiva (Ad-Hoc)
          # Usamos un comodín *.app para que no falle si cambias el nombre del proyecto
          find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -exec codesign --force --deep --sign - {} +
          
          echo "Firma Ad-Hoc completada con éxito."
        shell: bash

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Vigvita App v__VERSION__"
          releaseBody: "Vigvita App v__VERSION__ release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

