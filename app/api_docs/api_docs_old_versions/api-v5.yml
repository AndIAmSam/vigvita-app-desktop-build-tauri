global_specs:
  scope: "/*"

  constraints:
    max_body_size: 5mb
    max_header_size: 1mb
    timeout:
	  read: 5s
	  read_headers: 5s
	  write: 5s
	  idle: 60s

    on_request_limit_exceeded:
      action: "Connection Termination"
      description: "The server will forcefully close the TCP connection to prevent resource exhaustion."

  # Standard responses for any endpoint
  default_responses:
    500:
      contentType: text/plain
      body: "Internal server error"
      reason: "Unexpected server-side failure"

global_post_specs:
  scope: "POST /*"

  # Standar requirements for any POST endpoint
  request:
    contentType: application/json

  # Standard responses for any POST endpoint
  response:
    400:
      - contentType: text/plain
        body: Bad Request
        reason: The HTTP request body is malformed or cannot be parsed

	422:
      - contentType: application/json
        reason: |
			The JSON is well-formed but cannot be processed. This includes invalid data types (e.g., sending an integer instead of a string)
			or business validation failures (e.g., invalid email format, missing required fields).
        body: { "errors": { "field_name": "error_slug" } }

permissions:
  auth:
    description: "Verifies user session using Authorization (Bearer <token>) header or (session) cookie."
    on_failure:
      status: 404
      contentType: "text/html"

  super_admin:
    description: "Restricts access to users with the SuperAdmin role."
    on_failure:
      status: 404
      contentType: "text/html"

/api/signup:
  request:
    method: POST
    body:
      name:
        required: true
        min: 5
        max: 255
      email:
        required: true
        max: 255
      password:
        required: true
        min: 8
        max: 255
      token:
        required: true

  responses:
    201:
      - contentType: application/json
        reason: User created successfully and invitation marked as used
        body: { "status": "success" }

    403:
      - contentType: application/json
        reason: The token hash does not match any active invitation or is already accepted/expired
        body: {"error": "invalid_token"}

      - contentType: application/json
        reason: The provided email does not match the email associated with the token
        body: {"error": "email_mismatch"}

    422:
      - contentType: application/json
        reason: One or more fields failed format validation (email format, password length, etc)
        body: { "errors": { "field_name": "error_slug" } }

/api/login:
  request:
    method: POST
    body:
      email:
        required: true
      password:
        required: true

  responses:
    200:
      - contentType: application/json
        reason: Credentials verified and session created
        body:
          token: string
          name:
            type: string
            description: User's full name.
          redirect:
            type: string
            description: |
              The URL to which the server determines the user must be redirected
              based on their assigned role (e.g., /coming-soon, /admin/dashboard).

    401:
      - contentType: application/json
        reason: "The email doesn't exist or the password is incorrect"
        body: { "error": "invalid_credentials" }

    403:
      - contentType: application/json
        reason: "The user's access period (employment_period) has expired"
        body: { "error": "employment_period_ended" }

    422:
      - contentType: application/json
        reason: "Required fields are missing or empty"
        body: { "error": "missing_required_fields" }

/api/user:
  permissions: [auth, super_admin]

  request:
    method: POST
    body:
      email:
        required: true
      role:
        required: true
        type: string
        description: "Must match a valid system role (e.g., SuperAdmin, Admin, Advisor)"
      leader:
        required: false
        type: string
        description: "Email of an existing and active user"

  responses:
    201:
      - contentType: application/json
        reason: Invitation created successfully and token generated
        body: { "token": "string" }

    400:
      - contentType: application/json
        reason: The provided leader email does not exist
        body: { "error": "invalid_leader" }

    409:
      - contentType: application/json
        reason: An active invitation already exists for this email address
        body: { "error": "invitation_already_sent" }

    422:
      - contentType: application/json
        reason: Email format is invalid or the role does not exist in the system
        body: { "errors": { "field_name": "error_slug" } }

/api/forgot-password:
  request:
    method: POST
    body:
      email:
        required: true
        type: string
        description: "The user's registered email address."

  responses:
    200:
      - contentType: application/json
        reason: |
          Request received. To prevent email enumeration, this endpoint returns
          a success message regardless of whether the email exists in the system or not.
        body: { "status": "success" }

/api/dashboard-global:
  permissions: [auth, super_admin]

  request:
    method: GET
    query:
      preset:
        required: true
        type: string
        description: "A predefined date range string. Allowed values: 'week', 'month', 'quarter', 'last_6_months', 'year', 'custom'."
      start_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Custom start date for the dashboard data range. Only required and processed if preset is 'custom'. Must be on or after 2025-01-01 and not in the future."
      end_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Custom end date for the dashboard data range. Only required and processed if preset is 'custom'. Must be on or after 2025-01-01, not in the future, and greater than or equal to start_date."

  responses:
    200:
      - contentType: application/json
        reason: "Returns global dashboard statistics, KPIs, and charts properly aggregated."
        body:
          kpis:
            total_profiles:
              type: integer
              example: 100
            closed:
              type: integer
              example: 40
            in_process:
              type: integer
              example: 60
            effectiveness:
              type: float
              example: 40.0
            total_referrals:
              type: integer
              example: 20
            productivity:
              type: float
              example: 10.0
            referrals_per_closed:
              type: float
              example: 0.5
          timeline_array:
            type: array
            items:
              date:
                type: string
                description: "Format depends on date range duration (e.g. '02 Jan' for <= 31 days or 'Jan 2006' for > 31 days)"
                example: "01 Jan"
              created:
                type: integer
                example: 10
              closed:
                type: integer
                example: 4
          chart_data_pie:
            type: array
            items:
              name:
                type: string
                example: "Closed"
              value:
                type: integer
                example: 40
          top_generated:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              generated:
                type: integer
                example: 30
          top_closed:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              closed:
                type: integer
                example: 15
          top_referrals:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              referrals:
                type: integer
                example: 5
          advisors:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              id:
                type: UUID

    422:
      - contentType: application/json
        reason: "Invalid date presets or error parsing custom start/end dates."
        body:
        error: "Invalid dates"

/api/profiles/new:
  permissions: [auth, advisor, super_admin, admin]
  request:
    method: POST
    body:
      clients:
        type: array
        description: "A list of client objects to be created. Minimum of 1 client."
        items:
          id:
            required: false
            description: |
              When sent, it must be a valid UUID representing the profile ID to be updated;
              if it is not included or does not match an existing profile, a new profile will be created and the provided UUID will be ignored
          name:
            required: true
            type: string
            description: "The name of the client. Must be between 1 and 100 characters."
            example: "Juan Pérez"
          created_at:
            required: false
            type: string
            format: date-time
            description: "Timestampt of creation (if not provided, it will be mapped correctly at insertion to server's time)."
            example: "2026-03-10T15:00:00Z"
          is_closed:
            required: false
            type: boolean
            description: "Whether the profile was closed."
            example: false
          acquisition_status:
            required: true
            type: string
            description: "Current status of the profile acquisition. Must be one of: 'pending', 'cancelled', 'completed'."
            example: "pending"
          closing_types:
            required: false
            type: array
            items:
              type: string
            description: "Types of policies or plans closed for this client."
          data:
            required: false
            type: object
            description: "Detailed client data payload including Profile, Referrals, Assets, Insurance, etc. Stored encrypted in the database."
            properties:
              profile:
                type: object
                properties:
                  phone: { type: string }
                  occupation: { type: string }
                  hobbies: { type: string }
                  sport: { type: string }
                  smoker: { type: boolean }
                  birth_date: { type: string }
                  marital_status: { type: string }
                  spouse_name: { type: string }
                  spouse_phone: { type: string }
                  spouse_birth_date: { type: string }
                  spouse_occupation: { type: string }
                  spouse_smoker: { type: boolean }
                  spouse_hobbies: { type: string }
                  spouse_sport: { type: string }
                  dependents:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        age: { type: integer }
                        relationship: { type: string }
                        notes: { type: string }
                  note_protection: { type: string }
                  note_education: { type: string }
                  note_savings: { type: string }
                  note_retirement: { type: string }
                  note_health: { type: string }
                  note_risks: { type: string }
              children:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    age: { type: integer }
                    university: { type: string }
                    years_remaining: { type: integer }
                    projected_cost: { type: number }
                    annual_savings: { type: number }
              retirement:
                type: object
                properties:
                  life_expectancy: { type: integer }
                  retirement_age: { type: integer }
                  monthly_amount: { type: number }
                  current_age: { type: integer }
              assets:
                type: object
                properties:
                  savings: { type: number }
                  house: { type: number }
                  other_properties: { type: number }
                  vehicles: { type: number }
                  investments: { type: number }
                  other: { type: number }
              liabilities:
                type: object
                properties:
                  mortgage: { type: number }
                  loans: { type: number }
                  credit_cards: { type: number }
                  credit_limit: { type: number }
                  other: { type: number }
              insurance:
                type: object
                properties:
                  individual:
                    type: object
                    properties:
                      company: { type: string }
                      plan: { type: string }
                      coverage_amount: { type: number }
                      premium: { type: number }
                  group:
                    type: object
                    properties:
                      company: { type: string }
                      plan: { type: string }
                      coverage_amount: { type: number }
                      premium: { type: number }
                  other:
                    type: object
                    properties:
                      company: { type: string }
                      plan: { type: string }
                      coverage_amount: { type: number }
                      premium: { type: number }
              income:
                type: object
                properties:
                  holder: { type: number }
                  spouse: { type: number }
                  holder_benefits: { type: string }
                  spouse_benefits: { type: string }
              fixed_expenses:
                type: object
                properties:
                  utilities: { type: number }
                  housing: { type: number }
                  food: { type: number }
                  schools: { type: number }
                  transportation: { type: number }
                  insurance: { type: number }
              variable_expenses:
                type: object
                properties:
                  credit_payments: { type: number }
                  recreation: { type: number }
                  entertainment: { type: number }
                  household: { type: number }
                  health: { type: number }
                  other: { type: number }
              death_expenses:
                type: object
                properties:
                  funeral_costs: { type: number }
                  disability_costs: { type: number }
              plan_details:
                type: object
                properties:
                  other_income: { type: number }
                  interest_rate: { type: number }
                  protection_plan: { type: number }
                  savings_plan: { type: number }
              appointment:
                type: object
                properties:
                  day: { type: string }
                  month: { type: string }
                  time: { type: string }
                  location: { type: string }
                  needs_decision_maker: { type: boolean }
                  decision_maker_name: { type: string }
              referrals:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    age: { type: integer }
                    marital_status: { type: string }
                    occupation: { type: string }
                    phone: { type: string }
                    circle: { type: string }
                    family_group: { type: string }
              notes:
                type: string
              priority_levels:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    label: { type: string }
                    color: { type: string }
                    icon: { type: string }

  responses:
    201:
      - contentType: application/json
        reason: "Client profiles created successfully."
        body:
          data:
            type: array
            description: "Returns an array containing the UUIDs generated for the NEWLY inserted clients."
            items:
              type: string
              format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
    422:
      - contentType: application/json
        reason: "Validation error. Client name is missing, name exceeds 100 characters, classification exceeds 50 characters, or acquisition status is not within the valid enum."
        body:
          errors:
            "clients[0].name": "required|too_long"
            "clients[0].acquisition_status": "invalid"

      - contentType: application/json
        reason: "No clients sent."
        body:
          errors:
			  "clients": "required"

/dashboard/a/{advisor-uuid}:
  permissions: [auth, super_admin]

  request:
    method: GET
    query:
      preset:
        required: true
        type: string
        description: "A predefined date range string. Allowed values: 'week', 'month', 'quarter', 'last_6_months', 'year', 'custom'."
      start_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Custom start date for the dashboard data range. Only required and processed if preset is 'custom'. Must be on or after 2026-01-01 and not in the future."
      end_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Custom end date for the dashboard data range. Only required and processed if preset is 'custom'. Must be on or after 2026-01-01, not in the future, and greater than or equal to start_date."

  responses:
    200:
      - contentType: application/json
        reason: "Returns advisor-specific dashboard statistics, KPIs, and charts properly aggregated based on the requested date range."
        body:
          kpis:
            advisor_name:
              type: string
              example: "Juan Pérez"
            generated_count:
              type: integer
              example: 45
            closed:
              type: integer
              example: 15
            in_process:
              type: integer
              example: 30
            referrals_count:
              type: integer
              example: 10
          timeline_array:
            type: array
            items:
              date:
                type: string
                description: "Format depends on date range duration (e.g. '02 Jan' for <= 31 days or 'Jan 2006' for > 31 days)"
                example: "01 Jan"
              created:
                type: integer
                example: 8
              closed:
                type: integer
                example: 3
          chart_data_pie:
            type: array
            items:
              name:
                type: string
                description: "Either 'Closed' or 'Pending'"
                example: "Closed"
              value:
                type: integer
                example: 15

    404:
      - contentType: text/plain
        reason: "The requested advisor UUID was not found in the database."
        body: "Not Found\n"

    422:
      - contentType: application/json
        reason: "Invalid date presets, error parsing custom start/end dates, or dates out of allowed bounds."
        body:
          error: "Invalid dates"


/api/reset-password:
  request:
    method: POST
    body:
      token:
        required: true
        type: string
        description: "The reset token sent to the user's email."
      password:
        required: true
        min: 8
        max: 255
        type: string
        description: "The new password for the account."

  responses:
    200:
      - contentType: application/json
        reason: "Password updated successfully and reset token consumed/deleted."
        body: { "status": "success" }

    422:
      - contentType: application/json
        reason: "The reset token is invalid, does not exist, or has expired."
        body: { "error": "invalid_token" }

      - contentType: application/json
        reason: "One or more fields failed format validation (e.g., missing token, password length)."
        body: { "errors": { "field_name": "error_slug" } }

/api/users:
  permissions: [auth, super_admin]

  request:
    method: GET
    description: "Fetches a comprehensive list of all active users and pending invitations in the system."

  responses:
    200:
      - contentType: application/json
        reason: "Successfully retrieved users and invitations."
        body:
          data:
            type: object
            properties:
              users:
                type: array
                description: "List of all active users in the system (deleted users are excluded)."
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "Ana García"
                    email:
                      type: string
                      format: email
                      example: "ana@example.com"
                    id:
                      type: string
                      format: uuid
                      description: "The user's public UUID."
                    leader_id:
                      type: string
                      format: uuid
                      nullable: true
                      description: "The public UUID of the user's leader, if assigned."
                    role_name:
                      type: string
                      description: "The resolved human-readable role name (e.g., 'Admin', 'Advisor')."
                    access_expires_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: "Timestamp indicating when the user's access is revoked, if applicable."

              invitations:
                type: array
                description: "List of pending invitations (accepted invitations are excluded)."
                items:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                      description: "The email address the invitation was sent to."
                    created_at:
                      type: string
                      format: date-time
                      description: "When the invitation was generated."
                    expires_at:
                      type: string
                      format: date-time
                      description: "When the invitation token expires."
                    role_name:
                      type: string
                      description: "The resolved human-readable role name assigned to this invitation."
                    leader_name:
                      type: string
                      nullable: true
                      description: "The name of the leader assigned to this invited user, if any."

/api/user/{id}:
  permissions: [auth, super_admin]

  request:
    method: PATCH
    description: "Partially updates an active user's role, leader, or access status. At least one field is required."
    body:
      role:
        required: false
        type: string
        description: "Must match a valid system role (e.g., 'Admin', 'Advisor')."
      leader:
        required: false
        type: string
        description: "The public UUID of an existing user to act as the leader. Send an empty string ('') to unassign the current leader."
      revoke_access:
        required: false
        type: boolean
        description: "If true, revokes the user's access after 5 days. If false, restores access (sets access_expires_at to null)."

  responses:
    200:
      - contentType: application/json
        reason: "The user was successfully updated."
        body: { "status": "success" }

    404:
      - contentType: text/plain
        reason: "Invalid user UUID format or user not found."
        body: "Not Found\n"

    422:
      - contentType: application/json
        reason: "Validation failed (e.g., missing all fields, role doesn't exist, or leader UUID is invalid/not found)."
        body:
          errors:
            "body": "at_least_one_field_required"
            "role": "invalid"
            "leader": "invalid_leader"
			"leader": "invalid"