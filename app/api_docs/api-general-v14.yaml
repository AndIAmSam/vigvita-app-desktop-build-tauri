    description: |
        Per-advisor ADN dashboard. SuperAdmin and BusinessIntelligence may view any
        advisor. A TeamLeader may only view advisors on their own team; requesting an
        advisor who is not on their team returns 404, identical to a non-existent id
        (so it does not reveal whether that advisor exists).

    request:
        method: GET
        query:
            preset:
                required: true
                type: string
                enum: [week, month, q1, q2, q3, q4, last_6_months, year, custom]
                description: |
                    Date range preset:
                    - week: Monday of the current week → end of today.
                    - month: 1st of the current month → end of today.
                    - q1: Jan 1 – Mar 31 of the current year.
                    - q2: Apr 1 – Jun 30 of the current year.
                    - q3: Jul 1 – Sep 30 of the current year.
                    - q4: Oct 1 – Dec 31 of the current year.
                    Selecting a future quarter returns 422. If the quarter is in progress, end date is capped to today.
                    - last_6_months: 1st of the month 5 months ago → end of today (grouped monthly).
                    - year: Jan 1 of the current year → end of today.
                    - custom: Uses start_date and end_date. End date is capped to today if in the future.
            start_date:
                required: conditional
                type: string
                format: YYYY-MM-DD
                description: "Only required when preset is 'custom'. Must be on or after 2026-01-01."
            end_date:
                required: conditional
                type: string
                format: YYYY-MM-DD
                description: "Only required when preset is 'custom'. Must be on or after 2026-01-01, >= start_date. If in the future, it is silently capped to today."

    responses:
        200:
            - contentType: application/json
              reason: "Returns advisor-specific dashboard statistics, KPIs, and charts properly aggregated based on the requested date range."
              body:
                  kpis:
                      advisor_name:
                          type: string
                          example: "Juan Pérez"
                      generated_count:
                          type: integer
                          example: 45
                      closed:
                          type: integer
                          example: 15
                      in_process:
                          type: integer
                          example: 30
                      cancelled:
                          type: integer
                          example: 5
                      referrals_count:
                          type: integer
                          example: 10
                      unaccompanied:
                          type: integer
                          description: "Profiles created with accompaniment_status 'unaccompanied' (Sin acompañamiento)."
                          example: 20
                      demonstration:
                          type: integer
                          description: "Profiles created with accompaniment_status 'demonstration' (Demostración)."
                          example: 15
                      observation:
                          type: integer
                          description: "Profiles created with accompaniment_status 'observation' (Observación)."
                          example: 10
                  timeline_array:
                      type: array
                      items:
                          date:
                              type: string
                              description: "Format depends on date range duration (e.g. '02 Jan' for <= 32 days or 'Jan 2006' for > 32 days)"
                              example: "01 Jan"
                          created:
                              type: integer
                              example: 8
                          closed:
                              type: integer
                              example: 3
                  chart_data_pie:
                      type: array
                      items:
                          name:
                              type: string
                              description: "Either 'Closed', 'Pending', or 'Cancelled'"
                              example: "Closed"
                          value:
                              type: integer
                              example: 15

        404:
            - contentType: text/plain
              reason: "The requested advisor UUID was not found in the database."
              body: "Not Found\n"

        422:
            - contentType: application/json
              reason: "Invalid date presets, error parsing custom start/end dates, or dates out of allowed bounds."
              body:
                  error: "Invalid dates"

/api/dashboard/premiums:
    permissions: [auth, super_admin, business_intelligence]

    request:
        method: GET
        description: |
            PCA and PNA premium totals across the collection pipeline, filtered by date range
            and optionally branch. The paid / not_paid split is driven by the status of each
            policy's FIRST first-year receipt (renewal_id IS NULL, lowest id) — never a later
            receipt nor a renewal's:
              - paid:        the first-year receipt is 'paid'  (only issued policies qualify).
              - not_paid:    the first-year receipt is 'not_paid_yet' (only issued policies qualify).
              - in_emission: policies with status 'in_emission' (no receipts yet).
            Date filter: the paid / not_paid buckets filter by the first receipt's validity start
            (valid_from); the in_emission bucket filters by the policy issue_date (no receipts).
            PCA sums the first receipt's pca_acreditable (paid/not_paid) or policies.pca
            (in_emission). PNA always sums policies.annual_net_premium.
        query:
            preset:
                required: true
                type: string
                enum: [week, month, q1, q2, q3, q4, last_6_months, year, custom]
                description: "Date range preset (same semantics as /api/dashboard/a/{id}). Filters the receipt buckets by valid_from and the in_emission bucket by issue_date."
            start_date:
                required: conditional
                type: string
                format: YYYY-MM-DD
                description: "Only required when preset is 'custom'. Must be on or after 2026-01-01."
            end_date:
                required: conditional
                type: string
                format: YYYY-MM-DD
                description: "Only required when preset is 'custom'. Must be on or after 2026-01-01, >= start_date. If in the future, it is silently capped to today."
            branch:
                required: false
                type: string
                enum: [life, major_medical]
                description: "Optional insurance branch filter. 'life' (Vida) or 'major_medical' (GMM). Omit for both. Invalid value -> 400 invalid_filter."
            advisor:
                required: false
                type: string
                format: uuid
                description: "Optional advisor public UUID (see GET /api/advisors). Totals shrink to that advisor's policies. Malformed UUID -> 400 invalid_filter."
            product:
                required: false
                type: string
                description: "Optional product filter (valid product ENUM value). Invalid value -> 400 invalid_filter."
            note: |
                advisor/product/branch are the same filters the policy list accepts, so the
                dashboard totals track the filtered subset. status is NOT accepted here (the
                buckets already decompose by status); sending it returns 400 invalid_filter.

    responses:
        200:
            - contentType: application/json
              reason: "Returns PCA and PNA premium totals across the collection pipeline for the requested date range and filters."
              body:
                  pca:
                      description: "PCA totals as fixed 2-decimal strings."
                      paid:
                          type: string
                          description: "Sum of the first-year receipt's pca_acreditable for issued policies whose first receipt is 'paid'."
                          example: "125000.00"
                      not_paid:
                          type: string
                          description: "Sum of the first-year receipt's pca_acreditable for issued policies whose first receipt is 'not_paid_yet'."
                          example: "48000.50"
                      in_emission:
                          type: string
                          description: "Sum of policies.pca for policies with status 'in_emission'."
                          example: "32000.00"
                  pna:
                      description: "PNA (policies.annual_net_premium) totals as fixed 2-decimal strings, classified the same way as PCA."
                      paid:
                          type: string
                          description: "Sum for issued policies whose first-year receipt is 'paid'."
                          example: "98000.00"
                      not_paid:
                          type: string
                          description: "Sum for issued policies whose first-year receipt is 'not_paid_yet'."
                          example: "40000.00"
                      in_emission:
                          type: string
                          description: "Sum for policies with status 'in_emission'."
                          example: "27500.00"

        400:
            - contentType: application/json
              reason: "A filter (branch/advisor/product) is invalid, or an unsupported filter (e.g. status) was supplied."
              body:
                  error: "invalid_filter"

        422:
            - contentType: application/json
              reason: "Invalid date preset, error parsing custom start/end dates, or dates out of allowed bounds."
              body:
                  error: "Invalid dates"

/api/reset-password:
    request:
        method: POST
        body:
            token:
                required: true
                type: string
                description: "The reset token sent to the user's email."
            password:
                required: true
                min: 8
                max: 255
                type: string
                description: "The new password for the account."

    responses:
        200:
            - contentType: application/json
              reason: "Password updated successfully and reset token consumed/deleted."
              body: { "status": "success" }

        422:
            - contentType: application/json
              reason: "The reset token is invalid, does not exist, or has expired."
              body: { "error": "invalid_token" }

            - contentType: application/json
              reason: "One or more fields failed format validation (e.g., missing token, password length)."
              body: { "errors": { "field_name": "error_slug" } }

/api/users:
    permissions: [auth, super_admin]

    request:
        method: GET
        description: "Fetches a comprehensive list of all active users and pending invitations in the system."

    responses:
        200:
            - contentType: application/json
              reason: "Successfully retrieved users and invitations."
              body:
                  data:
                      type: object
                      properties:
                          users:
                              type: array
                              description: "List of all active users in the system (deleted users are excluded)."
                              items:
                                  type: object
                                  properties:
                                      name:
                                          type: string
                                          example: "Ana García"
                                      email:
                                          type: string
                                          format: email
                                          example: "ana@example.com"
                                      id:
                                          type: string
                                          format: uuid
                                          description: "The user's public UUID."
                                      leader_id:
                                          type: string
                                          format: uuid
                                          nullable: true
                                          description: "The public UUID of the user's leader, if assigned."
                                      role_name:
                                          type: string
                                          description: "The resolved human-readable role name (e.g., 'TeamLeader', 'Advisor', 'AdvisorTrainee')."
                                      access_expires_at:
                                          type: string
                                          format: date-time
                                          nullable: true
                                          description: "Timestamp indicating when the user's access is revoked, if applicable."

                          invitations:
                              type: array
                              description: "List of pending invitations (accepted invitations are excluded)."
                              items:
                                  type: object
                                  properties:
                                      email:
                                          type: string
                                          format: email
                                          description: "The email address the invitation was sent to."
                                      created_at:
                                          type: string
                                          format: date-time
                                          description: "When the invitation was generated."
                                      expires_at:
                                          type: string
                                          format: date-time
                                          description: "When the invitation token expires."
                                      role_name:
                                          type: string
                                          description: "The resolved human-readable role name assigned to this invitation."
                                      leader_name:
                                          type: string
                                          nullable: true
                                          description: "The name of the leader assigned to this invited user, if any."

/api/user/{id}:
    permissions: [auth, super_admin]

    request:
        method: PATCH
        description: "Partially updates an active user's role, leader, or access status. At least one field is required."
        body:
            role:
                required: false
                type: string
                description: "Must match a valid system role (e.g., 'TeamLeader', 'Advisor', 'AdvisorTrainee')."
            leader:
                required: false
                type: string
                description: "The public UUID of an existing user to act as the leader. Send an empty string ('') to unassign the current leader."
            revoke_access:
                required: false
                type: boolean
                description: "If true, revokes the user's access after 5 days. If false, restores access (sets access_expires_at to null)."

    responses:
        200:
            - contentType: application/json
              reason: "The user was successfully updated."
              body: { "status": "success" }

        404:
            - contentType: text/plain
              reason: "Invalid user UUID format or user not found."
              body: "Not Found\n"

        422:
            - contentType: application/json
              reason: "Validation failed (e.g., missing all fields, role doesn't exist, or leader UUID is invalid/not found)."
              body:
                  errors:
                      "body": "at_least_one_field_required"
                      "role": "invalid"
                      "leader": "invalid (bad UUID) | invalid_leader (not found or SuperAdmin)"

        403:
            - contentType: application/json
              reason: "The target user is the SuperAdmin. No modifications are allowed on this account."
              body: { "error": "cannot_modify_super_admin" }

/api/policy/initiate:
    permissions: [auth, super_admin, team_leader, advisor]
    request:
        method: POST
        contentType: application/json
        description: |
            Creates a policy application (solicitud de póliza). This is the first step before
            a full policy is created. Advisors, TeamLeaders, and SuperAdmins can initiate
            applications. Operations then processes them via POST /api/policy.
        body:
            application_folio:
                required: true
                type: string
                max: 50
                description: "Must be unique. Duplicate folios return 422."
            contractor_first_name:
                required: true
                type: string
                max: 100
            contractor_second_name:
                required: false
                type: string
                max: 100
            contractor_paternal_last_name:
                required: true
                type: string
                max: 100
            contractor_maternal_last_name:
                required: true
                type: string
                max: 100
            insurance_branch:
                required: true
                type: string
                enum: [life, major_medical]
            product:
                required: true
                type: string
                enum:
                    [
                        medicalife_familiar_ejecutivo,
                        medicalife_familiar_mas,
                        medicalife_familiar_basico,
                        medicalife_familiar_practico,
                        medicalife_familiar_conversion,
                        primordial,
                        metalife_mujer,
                        metalife_tu_futuro,
                        metalife_educacion,
                        metalife_retiro,
                        perfeclife,
                        tempolife,
                        totalife,
                        horizonte,
                        flexilife_inversion,
                        flexilife_suenos,
                        educalife,
                        tempolife_grandes_sumas,
                        tempolife_preferente,
                        met4u,
                    ]
            payment_frequency:
                required: true
                type: string
                enum: [annual, semiannual, quarterly, bimonthly, monthly]
                description: |
                    When payment_method is bank_teller (cash / Ventanilla), only 'annual' is allowed —
                    cash is settled up-front in a single payment.
            payment_method:
                required: true
                type: string
                description: |
                    Direct channel: call_center, next_pay, portal, spei, bank_teller, codi.
                    Automatic channel: clabe, amex, credit_card, debit_card, portal_msi, next_pay_msi.
            basic_premium:
                required: true
                type: float
                description: "Must be greater than 0."
            additional_premium:
                required: conditional
                type: float
                description: "Required for Metalife-family products (product identifier starts with 'metalife'). Must be >= 0."

    responses:
        201:
            - contentType: application/json
              reason: "Application created successfully."
              body:
                  status: "success"
                  application_id: string (uuid)
        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible field errors:
                  - application_folio: required, too_long, already_exists (duplicate)
                  - contractor_first_name: required, too_long
                  - contractor_second_name: too_long
                  - contractor_paternal_last_name: required, too_long
                  - contractor_maternal_last_name: required, too_long
                  - insurance_branch: invalid
                  - product: invalid
                  - payment_frequency: invalid (also returned when payment_method is bank_teller/cash and frequency is not 'annual')
                  - payment_method: invalid
                  - basic_premium: required (missing or <= 0)
                  - additional_premium: required (for Metalife-family products, identifier starts with 'metalife')
              body:
                  errors: object

/api/policy/applications:
    permissions: [auth, operations]
    request:
        method: GET
        description: "Returns all policy applications that have not yet been converted into a policy."
    responses:
        200:
            - contentType: application/json
              reason: "Returns the list of pending applications."
              body:
                  applications:
                      type: array
                      items:
                          id:
                              type: string
                              format: uuid
                              description: |
                                  Application public UUID. Used as application_id when creating a policy
                                  (POST /api/policy) and as the {id} path parameter for the application chat
                                  (e.g. GET /api/applications/{id}/chat/messages).
                          application_folio: string
                          contractor_full_name: string
                          insurance_branch:
                              type: string
                              enum: [life, major_medical]
                          product:
                              type: string
                              enum:
                                  [
                                      medicalife_familiar_ejecutivo,
                                      medicalife_familiar_mas,
                                      medicalife_familiar_basico,
                                      medicalife_familiar_practico,
                                      medicalife_familiar_conversion,
                                      primordial,
                                      metalife_mujer,
                                      metalife_tu_futuro,
                                      metalife_educacion,
                                      metalife_retiro,
                                      perfeclife,
                                      tempolife,
                                      totalife,
                                      horizonte,
                                      flexilife_inversion,
                                      flexilife_suenos,
                                      educalife,
                                      tempolife_grandes_sumas,
                                      tempolife_preferente,
                                      met4u,
                                  ]
                          payment_frequency:
                              type: string
                              enum:
                                  [
                                      annual,
                                      semiannual,
                                      quarterly,
                                      bimonthly,
                                      monthly,
                                  ]
                          payment_method: string
                          basic_premium: float
                          additional_premium: float (nullable)
                          created_at: string (datetime)
                          created_by_name: string

/api/policy:
    permissions: [auth, operations]
    request:
        method: POST
        contentType: application/json
        description: |
            Converts an existing policy application into a full policy.
            Most fields (contractor name, insurance_branch, product, payment_frequency, payment_method)
            are inherited from the application; they can be optionally overridden here.
            The advisor is always inherited from the application (the advisor who created it)
            and cannot be set or overridden here.
            The application chat stays open and writable regardless of the policy status; it is
            never read-only.
            Receipts are NOT generated on creation — they are generated when the policy status
            transitions to 'issued' via PATCH /api/policy/{id}.
        body:
            application_id:
                required: true
                type: string
                format: uuid
                description: "UUID of an existing, unprocessed policy application."
            policy_number:
                required: false
                type: string
                nullable: true
                description: "Optional. Must be greater than 0 and unique across all policies if provided."
            contractor_first_name:
                required: false
                type: string
                description: "Overrides the value from the application if provided."
            contractor_second_name:
                required: false
                type: string
                nullable: true
                description: "Overrides the value from the application if provided."
            contractor_paternal_last_name:
                required: false
                type: string
                description: "Overrides the value from the application if provided."
            contractor_maternal_last_name:
                required: false
                type: string
                description: "Overrides the value from the application if provided."
            insurance_branch:
                required: false
                type: string
                enum: [life, major_medical]
                description: "Overrides the value from the application if provided."
            product:
                required: false
                type: string
                enum:
                    [
                        medicalife_familiar_ejecutivo,
                        medicalife_familiar_mas,
                        medicalife_familiar_basico,
                        medicalife_familiar_practico,
                        medicalife_familiar_conversion,
                        primordial,
                        metalife_mujer,
                        metalife_tu_futuro,
                        metalife_educacion,
                        metalife_retiro,
                        perfeclife,
                        tempolife,
                        totalife,
                        horizonte,
                        flexilife_inversion,
                        flexilife_suenos,
                        educalife,
                        tempolife_grandes_sumas,
                        tempolife_preferente,
                        met4u,
                    ]
                description: "Overrides the value from the application if provided."
            payment_frequency:
                required: false
                type: string
                enum: [annual, semiannual, quarterly, bimonthly, monthly]
                description: "Overrides the value from the application if provided."
            payment_method:
                required: false
                type: string
                description: |
                    Overrides the value from the application if provided.
                    Valid values depend on the resulting payment_channel (auto-derived from this field):
                    - direct channel: call_center, next_pay, portal, spei, bank_teller, codi
                    - automatic channel: clabe, amex, credit_card, debit_card, portal_msi, next_pay_msi
            contractor_rfc:
                required: true
                type: string
            contractor_email:
                required: true
                type: string
                description: "Must be a valid email format."
            contractor_phone:
                required: true
                type: string
            contractor_secondary_phone:
                required: false
                type: string
                description: "Optional second contractor phone. Max 20 characters. Omitted or empty stores NULL."
            print_policy:
                required: false
                type: boolean
                default: false
            inc_sum_assured:
                required: false
                type: boolean
                default: false
            multiple_insured:
                required: false
                type: boolean
                default: false
            direct_debit:
                required: false
                type: boolean
                default: false
                description: |
                    Must be false when the effective payment_channel is 'direct'.
                    Accepted freely when channel is 'automatic'.
                    Payment channel is auto-derived from payment_method.
            pca:
                required: false
                type: float
                description: |
                    Premium per receipt (Cuota de Pago). If omitted or <= 0, it is automatically
                    calculated as: annual_net_premium / receipts_count(payment_frequency).
            validity_start:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Optional; may be filled in later (before issuance)."
            validity_end:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Optional; when both validity dates are provided, must be strictly after validity_start."
            annual_basic_premium:
                required: true
                type: float
            annual_additional_premium:
                required: true
                type: float
            annual_net_premium:
                required: true
                type: float
                description: "Used to auto-calculate pca if pca is not provided or <= 0."
            issue_date:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Optional; may be filled in later (before issuance)."
            comments:
                required: false
                type: string
                max: 500
                description: "Optional policy-level operational note."

    responses:
        201:
            - contentType: application/json
              reason: "Policy created successfully. Receipts will be generated when status transitions to 'issued'."
              body:
                  status: "success"
                  policy_id: string (uuid)

        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible field errors:
                  - application_id: required (missing), invalid (bad UUID format or not found), already_processed (application already has a policy)
                  - contractor_first_name: required (if application value is empty and no override is provided)
                  - contractor_paternal_last_name: required (same condition)
                  - contractor_maternal_last_name: required (same condition)
                  - contractor_rfc: required
                  - contractor_email: required, invalid (bad format)
                  - contractor_phone: required
                  - contractor_secondary_phone: too_long (exceeds 20 characters)
                  - insurance_branch: invalid
                  - product: invalid
                  - payment_frequency: invalid
                  - payment_method: invalid (value not in allowed list)
                  - direct_debit: invalid (true when effective payment_channel is 'direct')
                  - validity_start: invalid (bad date format)
                  - validity_end: invalid (bad date format or not after validity_start)
                  - issue_date: invalid (bad date format)
                  - policy_number: already_exists (duplicate)
              body:
                  errors: object

/api/policies:
    permissions: [auth, operations, super_admin]
    request:
        method: GET
        query:
            cursor:
                required: false
                type: string
                description: |
                    Base64-encoded UUID of the last policy received in the previous page.
                    When omitted, returns the first page.
                    When provided, returns the next 20 policies older than the referenced one.
            status:
                required: false
                type: string
                enum: [pending, in_emission, suspended, not_taken, issued]
                description: "Filter by policy status. Invalid value -> 400 invalid_filter."
            product:
                required: false
                type: string
                description: "Filter by product (must be a valid product ENUM value). Invalid value -> 400 invalid_filter."
            advisor:
                required: false
                type: string
                format: uuid
                description: |
                    Filter by advisor public UUID (as returned by GET /api/advisors).
                    Malformed UUID -> 400 invalid_filter; a well-formed UUID with no match returns an empty page.
            policy_number:
                required: false
                type: string
                description: "Filter by exact policy number (> 0). Non-numeric -> 400 invalid_filter."
            q:
                required: false
                type: string
                description: "Free-text search over the contractor's full name (LIKE match)."
            created_from / created_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by policy creation date (created_at), inclusive range. Either bound is optional. Invalid date -> 400 invalid_filter."
            issue_from / issue_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by policy issue date (issue_date / fecha de emisión), inclusive range."
            validity_start_from / validity_start_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by validity_start, inclusive range."
            validity_end_from / validity_end_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by validity_end, inclusive range."
            note: |
                Filters are combinable and must be resent on every page; the cursor only
                carries the page position. Date ranges are inclusive of both ends (a `_to` of
                YYYY-MM-DD covers the whole day).

    responses:
        200:
            - contentType: application/json
              reason: "Returns a paginated list of policies ordered from newest to oldest."
              body:
                  policies:
                      type: array
                      description: "Up to 20 policies per page."
                      items:
                          id:
                              type: string
                              format: uuid
                              description: "Policy public UUID."
                          application_id:
                              type: string
                              format: uuid
                              description: "Public UUID of the originating application. Use it to connect to the application chat."
                          status:
                              type: string
                              enum:
                                  [
                                      pending,
                                      in_emission,
                                      issued,
                                      suspended,
                                      not_taken,
                                  ]
                          policy_number:
                              type: string
                              nullable: true
                          advisor_name:
                              type: string
                          product:
                              type: string
                              enum:
                                  [
                                      medicalife_familiar_ejecutivo,
                                      medicalife_familiar_mas,
                                      medicalife_familiar_basico,
                                      medicalife_familiar_practico,
                                      medicalife_familiar_conversion,
                                      primordial,
                                      metalife_mujer,
                                      metalife_tu_futuro,
                                      metalife_educacion,
                                      metalife_retiro,
                                      perfeclife,
                                      tempolife,
                                      totalife,
                                      horizonte,
                                      flexilife_inversion,
                                      flexilife_suenos,
                                      educalife,
                                      tempolife_grandes_sumas,
                                      tempolife_preferente,
                                      met4u,
                                  ]
                          contractor_name:
                              type: string
                  next_cursor:
                      type: string
                      nullable: true
                      description: |
                          Base64-encoded UUID of the last item in the current page.
                          Pass as ?cursor= in the next request to fetch the following page.
                          Null when there are no more pages (current page has fewer than 20 results).

        400:
            - contentType: application/json
              reason: "The cursor is not valid base64 or does not decode to a valid UUID."
              body: { "error": "invalid_cursor" }
            - contentType: application/json
              reason: "A filter param carries an invalid value (status/product not in the ENUM, or advisor not a UUID)."
              body: { "error": "invalid_filter" }

/api/billing/policies:
    permissions: [auth, billing]
    request:
        method: GET
        query:
            cursor:
                required: false
                type: string
                description: |
                    Base64-encoded UUID of the last policy received in the previous page.
                    When omitted, returns the first page; when provided, returns the next 20.
            status:
                required: false
                type: string
                enum: [pending, in_emission, suspended, not_taken, issued]
                description: "Filter by policy status. Invalid value -> 400 invalid_filter."
            product:
                required: false
                type: string
                description: "Filter by product (must be a valid product ENUM value). Invalid value -> 400 invalid_filter."
            advisor:
                required: false
                type: string
                format: uuid
                description: "Filter by advisor public UUID (see GET /api/advisors). Malformed UUID -> 400 invalid_filter."
            branch:
                required: false
                type: string
                enum: [life, major_medical]
                description: "Filter by insurance branch (ramo). Invalid value -> 400 invalid_filter."
            policy_number:
                required: false
                type: string
                description: "Filter by exact policy number (> 0). Non-numeric -> 400 invalid_filter."
            created_from / created_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by policy creation date (created_at), inclusive range. Either bound is optional. Invalid date -> 400 invalid_filter."
            issue_from / issue_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Filter by policy issue date (issue_date / fecha de emisión), inclusive range."
            payment_from / payment_to:
                required: false
                type: string
                format: YYYY-MM-DD
                description: |
                    Filter by receipt payment date (real_payment_date / fecha de pago), inclusive range.
                    Matches a policy when ANY of its receipts was paid within the range.
            note: |
                Filters are combinable and must be resent on every page; the cursor only
                carries the page position. Date ranges are inclusive of both ends.

    responses:
        200:
            - contentType: application/json
              reason: "Reduced policy list for Billing, ordered from newest to oldest."
              body:
                  policies:
                      type: array
                      description: "Up to 20 policies per page."
                      items:
                          id:
                              type: string
                              format: uuid
                              description: "Policy public UUID (used to open the policy's receipts)."
                          policy_number:
                              type: string
                              nullable: true
                          advisor_name:
                              type: string
                          product:
                              type: string
                  next_cursor:
                      type: string
                      nullable: true
                      description: "Base64 cursor for the next page, or null when there are no more pages."

        400:
            - contentType: application/json
              reason: "The cursor is not valid base64 or does not decode to a valid UUID."
              body: { "error": "invalid_cursor" }
            - contentType: application/json
              reason: "A filter param carries an invalid value, or a filter other than product/advisor/policy_number was supplied."
              body: { "error": "invalid_filter" }

/api/billing/receipts:
    permissions: [auth, billing]
    request:
        method: GET
        description: |
            Lists policies that have at least one payment receipt in the selected month with the
            given receipt status, with the matching receipts nested inside each policy. Same reduced
            policy shape as GET /api/billing/policies plus a `receipts` array. Only receipts that
            match the month and status are returned per policy. Ordered newest to oldest, paginated.
        query:
            month:
                required: true
                type: string
                format: YYYY-MM
                description: |
                    Month to filter receipts by. A receipt belongs to a month when its validity
                    window starts (valid_from) within it. Missing or malformed -> 400 invalid_month.
            receipt_status:
                required: true
                type: string
                enum: [paid, cancelled, not_paid_yet]
                description: "Filter the nested receipts (and the policies that have them) by receipt status. Missing or invalid value -> 400 invalid_filter."
            cursor:
                required: false
                type: string
                description: |
                    Base64-encoded UUID of the last policy received in the previous page.
                    When omitted, returns the first page; when provided, returns the next 20.
            product:
                required: false
                type: string
                description: "Filter by product (must be a valid product ENUM value). Invalid value -> 400 invalid_filter."
            advisor:
                required: false
                type: string
                format: uuid
                description: "Filter by advisor public UUID (see GET /api/advisors). Malformed UUID -> 400 invalid_filter."
            policy_number:
                required: false
                type: string
                description: "Filter by exact policy number. Non-matching value -> empty result; invalid usage -> 400 invalid_filter."

    responses:
        200:
            - contentType: application/json
              reason: "Policies (with their matching receipts) for the month, ordered from newest to oldest."
              body:
                  policies:
                      type: array
                      description: "Up to 20 policies per page; only policies with at least one matching receipt."
                      items:
                          id:
                              type: string
                              format: uuid
                              description: "Policy public UUID."
                          policy_number:
                              type: string
                              nullable: true
                          advisor_name:
                              type: string
                          product:
                              type: string
                          receipts:
                              type: array
                              description: "Receipts of this policy that matched the month/status filter, ordered by id."
                              items:
                                  id: { type: string, format: uuid }
                                  status:
                                      type: string
                                      enum: [paid, cancelled, not_paid_yet]
                                  pca_acreditable: decimal (nullable)
                                  client_payment_date: string (YYYY-MM-DD, nullable)
                                  real_payment_date: string (YYYY-MM-DD, nullable)
                                  advisor_credited_date: string (YYYY-MM-DD, nullable)
                                  promotoria_month: string (YYYY-MM-DD, nullable)
                                  comments: string (nullable)
                                  valid_from: string (YYYY-MM-DD)
                                  valid_until: string (YYYY-MM-DD)
                  next_cursor:
                      type: string
                      nullable: true
                      description: "Base64 cursor for the next page, or null when there are no more pages."

        400:
            - contentType: application/json
              reason: "The month query param is missing or not a valid YYYY-MM value."
              body: { "error": "invalid_month" }
            - contentType: application/json
              reason: "The cursor is not valid base64 or does not decode to a valid UUID."
              body: { "error": "invalid_cursor" }
            - contentType: application/json
              reason: "A filter param (receipt_status/product/advisor/policy_number) carries an invalid value, or an unsupported filter was supplied."
              body: { "error": "invalid_filter" }

/api/advisors:
    permissions: [auth, operations, billing]
    request:
        method: GET
    responses:
        200:
            - contentType: application/json
              reason: "Advisors (SuperAdmin, TeamLeader, Advisor) with their public UUID and name, for the policy list advisor filter."
              body:
                  advisors:
                      type: array
                      items:
                          id:
                              type: string
                              format: uuid
                          name:
                              type: string

# ---------------------------------------------------------------------------
# Promotoria bonuses
# ---------------------------------------------------------------------------
# Read-only endpoints that recompute the MetLife "Bonos de Promotoria" from SQL
# (policies / policy_receipts / policy_renewals). They cover a single fixed
# promotor year (year 4: 2026-04-01 -> 2027-03-31) and report GROSS amounts:
# the legacy manual advance/settlement deductions are intentionally ignored.
# One endpoint per bonus, plus the persistence and efficiency calculations they
# depend on (exposed for verification).

/api/bonuses/life:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Life production bonus per quarter. Filters paid life receipts within
            the promotor year, groups PCA by quarter, and applies the band table.
            The band column (p84/p81/p78) is chosen from the 24-cosecha
            persistence computed from SQL. A quarter qualifies only with >= 6
            primordials (INITIAL receipts). Amounts are gross.
        query:
            month:
                required: false
                type: string
                format: YYYY-MM
                description: "Evaluation month for the persistence input. Defaults to the current month."
    responses:
        200:
            - contentType: application/json
              reason: "Per-quarter life bonus plus the annual gross total."
              body:
                  promotor_year:
                      type: integer
                      example: 4
                  period:
                      type: string
                      example: "2026-04-01 → 2027-03-31"
                  persistence_pct:
                      type: float
                      example: 96.0
                  persistence_column:
                      type: string
                      description: "p84 | p81 | p78 | '' (does not qualify)."
                      example: "p84"
                  quarters:
                      type: array
                      items:
                          quarter:
                              type: string
                              example: "T1"
                          label:
                              type: string
                              example: "Abr-Jun 2026"
                          pca:
                              type: float
                              example: 1240000.00
                          primordials:
                              type: integer
                              example: 8
                          qualifies:
                              type: boolean
                              example: true
                          percentage:
                              type: float
                              example: 0.22
                          gross_amount:
                              type: float
                              example: 272800.00
                  gross_total:
                      type: float
                      example: 272800.00
        422:
            - contentType: application/json
              reason: "The month query param is not a valid YYYY-MM value."
              body:
                  error: "invalid month"

/api/bonuses/major-medical:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Major-medical (GMM) bonus per quarter. Gate: universal-life INITIAL
            PNA >= 315,000 in the quarter. Base: PCA of major_medical receipts
            (initial + arrastre) in the quarter, run through the GMM band table.
            Amounts are gross.
    responses:
        200:
            - contentType: application/json
              reason: "Per-quarter GMM bonus plus the annual gross total."
              body:
                  promotor_year:
                      type: integer
                      example: 4
                  period:
                      type: string
                      example: "2026-04-01 → 2027-03-31"
                  quarters:
                      type: array
                      items:
                          quarter:
                              type: string
                              example: "T1"
                          label:
                              type: string
                              example: "Abr-Jun 2026"
                          pca:
                              type: float
                              example: 700000.00
                          universal_pna:
                              type: float
                              example: 320000.00
                          meets_requirement:
                              type: boolean
                              example: true
                          percentage:
                              type: float
                              example: 0.09
                          gross_amount:
                              type: float
                              example: 63000.00
                  gross_total:
                      type: float
                      example: 63000.00

/api/bonuses/metalife:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Metalife (universal growth) bonus per quarter. Requires persistence
            >= 84, the quarter qualifying for the life bonus, and a prior-year PCA
            base >= 750,000. Growth is measured on universal PNA vs the prior
            promotor year (computed from SQL); the payout is the PCA difference
            times the growth band. Amounts are gross.
        query:
            month:
                required: false
                type: string
                format: YYYY-MM
                description: "Evaluation month for the persistence input. Defaults to the current month."
    responses:
        200:
            - contentType: application/json
              reason: "Per-quarter Metalife growth bonus plus the annual gross total."
              body:
                  promotor_year:
                      type: integer
                      example: 4
                  period:
                      type: string
                      example: "2026-04-01 → 2027-03-31"
                  persistence_pct:
                      type: float
                      example: 96.0
                  quarters:
                      type: array
                      items:
                          quarter:
                              type: string
                              example: "T1"
                          label:
                              type: string
                              example: "Abr-Jun 2026"
                          pca_current:
                              type: float
                              example: 900000.00
                          pca_prior:
                              type: float
                              example: 750000.00
                          pna_current:
                              type: float
                              example: 400000.00
                          pna_prior:
                              type: float
                              example: 300000.00
                          growth_pct:
                              type: float
                              example: 0.33
                          meets_persistence:
                              type: boolean
                              example: true
                          meets_life:
                              type: boolean
                              example: true
                          meets_prior_base:
                              type: boolean
                              example: true
                          percentage:
                              type: float
                              example: 0.20
                          gross_amount:
                              type: float
                              example: 30000.00
                  gross_total:
                      type: float
                      example: 30000.00
        422:
            - contentType: application/json
              reason: "The month query param is not a valid YYYY-MM value."
              body:
                  error: "invalid month"

/api/bonuses/development:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Development bonus per recruited agent. Agents are advisors with a
            month_zero. Gate: collection efficiency >= 81. For each promotor-year
            month, the band comes from the agent's stage-specific accumulated PCA
            (months 1-12 vs 13-24) and the payout is that month's PCA times the
            stage rate, for agents in their first 24 months. Amounts are gross.
        query:
            month:
                required: false
                type: string
                format: YYYY-MM
                description: "Evaluation month for the efficiency input. Defaults to the current month."
    responses:
        200:
            - contentType: application/json
              reason: "Per-agent development bonus plus the total."
              body:
                  promotor_year:
                      type: integer
                      example: 4
                  period:
                      type: string
                      example: "2026-04-01 → 2027-03-31"
                  efficiency_pct:
                      type: float
                      example: 85.0
                  meets_efficiency:
                      type: boolean
                      example: true
                  agents:
                      type: array
                      items:
                          advisor_id:
                              type: string
                              format: uuid
                          name:
                              type: string
                              example: "SILVIA SAMANO MACIAS"
                          month_zero:
                              type: string
                              format: YYYY-MM
                              example: "2025-10"
                          gross_total:
                              type: float
                              example: 12500.00
                  gross_total:
                      type: float
                      example: 12500.00
        422:
            - contentType: application/json
              reason: "The month query param is not a valid YYYY-MM value."
              body:
                  error: "invalid month"

/api/bonuses/connection:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Connection (recruitment) bonus per recruited agent. Agents are
            advisors with a month_zero. For each promotor-year month, the group
            rate depends on how many agents reached 125,000 of 12-month PCA and
            the highest such PCA; each qualifying agent in their first 12 months
            earns that rate on the month's PCA. Amounts are gross.
    responses:
        200:
            - contentType: application/json
              reason: "Per-agent connection bonus plus the total."
              body:
                  promotor_year:
                      type: integer
                      example: 4
                  period:
                      type: string
                      example: "2026-04-01 → 2027-03-31"
                  agents:
                      type: array
                      items:
                          advisor_id:
                              type: string
                              format: uuid
                          name:
                              type: string
                              example: "CRISTIAN IVAN CASTILLO PALMA"
                          month_zero:
                              type: string
                              format: YYYY-MM
                              example: "2025-08"
                          gross_total:
                              type: float
                              example: 9000.00
                  gross_total:
                      type: float
                      example: 9000.00

/api/bonuses/persistence:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Persistence calculation for 12/24/36 cosechas (accumulated). For each
            life policy in the emission window, counts paid vs expected receipts
            up to the evaluation month; the general figure is the simple average
            of per-policy percentages. Feeds the life and Metalife bonuses.
        query:
            month:
                required: false
                type: string
                format: YYYY-MM
                description: "Evaluation month. Defaults to the current month."
    responses:
        200:
            - contentType: application/json
              reason: "Persistence percentage for each cosecha window."
              body:
                  evaluation_month:
                      type: string
                      format: YYYY-MM
                      example: "2026-07"
                  cosechas:
                      type: array
                      items:
                          cosechas:
                              type: integer
                              example: 24
                          percentage:
                              type: float
                              example: 96.0
                          policies:
                              type: integer
                              example: 120
        422:
            - contentType: application/json
              reason: "The month query param is not a valid YYYY-MM value."
              body:
                  error: "invalid month"

/api/bonuses/efficiency:
    permissions: [auth, super_admin, business_intelligence]
    request:
        method: GET
        description: |
            Collection-efficiency calculation. For life policies emitted from 2024
            up to the evaluation month (excluding those whose latest credited
            receipt is cancelled), counts how many have their target month
            (evaluation month minus 2, with a grace period) paid. Feeds the
            development bonus gate.
        query:
            month:
                required: false
                type: string
                format: YYYY-MM
                description: "Evaluation month. Defaults to the current month."
    responses:
        200:
            - contentType: application/json
              reason: "Collection efficiency percentage for the target month."
              body:
                  percentage:
                      type: float
                      example: 85.0
                  total_policies:
                      type: integer
                      example: 439
                  paid_policies:
                      type: integer
                      example: 373
                  target_month:
                      type: string
                      format: YYYY-MM
                      example: "2026-05"
        422:
            - contentType: application/json
              reason: "The month query param is not a valid YYYY-MM value."
              body:
                  error: "invalid month"

/api/policy/{id}:
    # Operations and SuperAdmin GET any policy; Advisor GETs only their OWN policies
    # (a foreign UUID returns 404). Operations may PATCH any field; Billing may PATCH
    # only payment_method / direct_debit (payment_channel auto-derives).
    permissions: [auth, operations, super_admin, advisor, billing]

    GET:
        description: "Retrieves full policy details. Advisors are scoped to the policies they own."
        responses:
            200:
                - contentType: application/json
                  reason: "Returns the full policy."
                  body:
                      policy:
                          id: string (uuid)
                          status:
                              type: string
                              enum:
                                  [
                                      pending,
                                      in_emission,
                                      issued,
                                      suspended,
                                      not_taken,
                                  ]
                          policy_number: string (nullable)
                          application_folio: string
                          contractor_first_name: string
                          contractor_second_name: string (nullable)
                          contractor_paternal_last_name: string
                          contractor_maternal_last_name: string
                          contractor_rfc: string
                          contractor_email: string
                          contractor_phone: string
                          contractor_secondary_phone: string (nullable)
                          print_policy: boolean
                          advisor_id: string (uuid)
                          advisor_name: string
                          advisor_key: integer (nullable)
                          advisor_status: string (nullable) — advisor lifecycle status (active | inactive | pre_connected | connected); read-only view of the assigned advisor.
                          team_leader_id: string (uuid, nullable) — the advisor's team leader, or null if they have none.
                          team_leader_name: string (nullable)
                          insurance_branch:
                              type: string
                              enum: [life, major_medical]
                          product:
                              type: string
                              enum:
                                  [
                                      medicalife_familiar_ejecutivo,
                                      medicalife_familiar_mas,
                                      medicalife_familiar_basico,
                                      medicalife_familiar_practico,
                                      medicalife_familiar_conversion,
                                      primordial,
                                      metalife_mujer,
                                      metalife_tu_futuro,
                                      metalife_educacion,
                                      metalife_retiro,
                                      perfeclife,
                                      tempolife,
                                      totalife,
                                      horizonte,
                                      flexilife_inversion,
                                      flexilife_suenos,
                                      educalife,
                                      tempolife_grandes_sumas,
                                      tempolife_preferente,
                                      met4u,
                                  ]
                          inc_sum_assured: boolean
                          multiple_insured: boolean
                          payment_frequency:
                              type: string
                              enum:
                                  [
                                      annual,
                                      semiannual,
                                      quarterly,
                                      bimonthly,
                                      monthly,
                                  ]
                          payment_method: string
                          payment_channel:
                              type: string
                              enum: [automatic, direct]
                              description: "Auto-derived from payment_method."
                          direct_debit: boolean
                          pca: float
                          validity_start: string (YYYY-MM-DD, nullable)
                          validity_end: string (YYYY-MM-DD, nullable)
                          annual_basic_premium: float
                          annual_additional_premium: float
                          annual_net_premium: float
                          issue_date: string (YYYY-MM-DD, nullable)
                          comments: string (nullable) — policy-level operational note
                          created_at: string (datetime)
            404:
                - reason: "Policy not found, deleted, or (for an Advisor) not owned by the caller."

    PATCH:
        description: |
            Edits policy fields or soft-deletes the policy.
            All field updates are optional (PATCH semantics). Only changed values are persisted.
            A reason is always required for audit logging.

            Policy data is editable at any status: the former issued/not_taken lock was removed,
            so Operations may correct any field after issuance. Editing application_folio also
            updates the authoritative (UNIQUE) policy_applications row; a folio already used by
            another application returns { "errors": { "application_folio": "already_exists" } } in 422.

            Billing role: field-level restriction — Billing may only send payment_method, direct_debit
            and/or payment_frequency (plus the required reason). Any other field returns
            403 { "error": "forbidden_field" }. payment_channel is auto-derived from payment_method.
            Changing payment_frequency is allowed even when receipts are already paid: the first-year
            receipts are regenerated for the new frequency (any prior payment state on that term is
            discarded by design). To change a renewal term's frequency, use
            PATCH /api/policy/{id}/renewal/{renewalId}.

            Status transitions allowed:
              pending     → in_emission | not_taken | suspended
              in_emission → issued | suspended | not_taken
              suspended   → in_emission
              issued      → not_taken
            Invalid transitions return { "errors": { "status": "invalid_transition" } }.
            Transitioning to 'issued' generates all first-year receipts and requires an issue_date
            (already set or provided in the same request); otherwise { "errors": { "issue_date": "required" } }.

            To soft-delete, send { "delete": true, "reason": "..." }.
            Receipts are never deleted.

            Receipt management is handled separately by the Billing role via PATCH /api/receipt/{id}.
        body:
            reason:
                required: true
                type: string
                description: "Audit reason (max 255 chars)."
            delete:
                required: false
                type: boolean
                description: "Set to true to soft-delete the policy."
            status:
                {
                    required: false,
                    type: string,
                    enum: [in_emission, issued, suspended, not_taken],
                }
            policy_number: { required: false, type: string }
            application_folio: { required: false, type: string }
            contractor_first_name: { required: false, type: string }
            contractor_second_name: { required: false, type: string }
            contractor_paternal_last_name: { required: false, type: string }
            contractor_maternal_last_name: { required: false, type: string }
            contractor_rfc: { required: false, type: string }
            contractor_email: { required: false, type: string }
            contractor_phone: { required: false, type: string }
            print_policy: { required: false, type: boolean }
            advisor_id: { required: false, type: string, format: uuid }
            insurance_branch:
                { required: false, type: string, enum: [life, major_medical] }
            product:
                {
                    required: false,
                    type: string,
                    enum:
                        [
                            medicalife_familiar_ejecutivo,
                            medicalife_familiar_mas,
                            medicalife_familiar_basico,
                            medicalife_familiar_practico,
                            medicalife_familiar_conversion,
                            primordial,
                            metalife_mujer,
                            metalife_tu_futuro,
                            metalife_educacion,
                            metalife_retiro,
                            perfeclife,
                            tempolife,
                            totalife,
                            horizonte,
                            flexilife_inversion,
                            flexilife_suenos,
                            educalife,
                            tempolife_grandes_sumas,
                            tempolife_preferente,
                            met4u,
                        ],
                }
            inc_sum_assured: { required: false, type: boolean }
            multiple_insured: { required: false, type: boolean }
            payment_frequency:
                required: false
                type: string
                enum: [annual, semiannual, quarterly, bimonthly, monthly]
                description: |
                    Cannot be changed if the first receipt already has status 'paid'.
                    Changing this regenerates all first-year receipts.
            payment_method:
                required: false
                type: string
                description: |
                    Direct channel: call_center, next_pay, portal, spei, bank_teller, codi.
                    Automatic channel: clabe, amex, credit_card, debit_card, portal_msi, next_pay_msi.
                    payment_channel is auto-derived and updated accordingly.
            direct_debit: { required: false, type: boolean }
            pca: { required: false, type: float }
            validity_start:
                { required: false, type: string, format: YYYY-MM-DD }
            validity_end: { required: false, type: string, format: YYYY-MM-DD }
            annual_basic_premium: { required: false, type: float }
            annual_additional_premium: { required: false, type: float }
            annual_net_premium: { required: false, type: float }
            issue_date: { required: false, type: string, format: YYYY-MM-DD }
            comments:
                required: false
                type: string
                max: 500
                description: "Policy-level operational note. Always editable (even on a locked policy). Send empty string to clear."
        responses:
            200:
                - contentType: application/json
                  reason: "Policy updated or soft-deleted successfully."
                  body: { "status": "success" }
            404:
                - reason: "Policy not found or already deleted."
            422:
                - contentType: application/json
                  reason: |
                      Validation failed or no changes detected.
                      If no fields differ from current values: { "error": "no_changes" }.
                      If a locked field was sent: { "errors": { "field_name": "policy_locked" } }.
                      Otherwise: { "errors": { "field_name": "error_code" } }.
                  body:
                      errors: object

/api/policy/{id}/restore:
    permissions: [auth, operations]
    request:
        method: PATCH
        description: "Restores a soft-deleted policy."
        body:
            reason:
                required: true
                type: string
                description: "Audit reason for restoring."
    responses:
        200:
            - contentType: application/json
              reason: "Policy restored successfully."
              body: { "status": "success" }
        404:
            - reason: "No deleted policy found with this UUID."
        422:
            - contentType: application/json
              reason: "Missing reason."
              body:
                  errors: { reason: "required" }

/api/policies/deleted:
    permissions: [auth, operations]
    request:
        method: GET
        description: "Returns all soft-deleted policies with minimal info and deletion date. No pagination."
    responses:
        200:
            - contentType: application/json
              reason: "Returns the list of deleted policies."
              body:
                  policies:
                      type: array
                      items:
                          id: { type: string, format: uuid }
                          policy_number: { type: string }
                          contractor_name: { type: string }
                          product:
                              {
                                  type: string,
                                  enum:
                                      [
                                          medicalife_familiar_ejecutivo,
                                          medicalife_familiar_mas,
                                          medicalife_familiar_basico,
                                          medicalife_familiar_practico,
                                          medicalife_familiar_conversion,
                                          primordial,
                                          metalife_mujer,
                                          metalife_tu_futuro,
                                          metalife_educacion,
                                          metalife_retiro,
                                          perfeclife,
                                          tempolife,
                                          totalife,
                                          horizonte,
                                          flexilife_inversion,
                                          flexilife_suenos,
                                          educalife,
                                          tempolife_grandes_sumas,
                                          tempolife_preferente,
                                          met4u,
                                      ],
                              }
                          deleted_at: { type: string, format: datetime }

/api/advisor/applications:
    permissions: [auth, advisor]
    note: "Also accessible to SuperAdmin and TeamLeader."
    request:
        method: GET
        description: "Returns all policy applications created by the authenticated user."
    responses:
        200:
            - contentType: application/json
              reason: "Returns the list of applications created by the advisor."
              body:
                  applications:
                      type: array
                      items:
                          application_folio: string
                          contractor_full_name: string
                          insurance_branch:
                              type: string
                              enum: [life, major_medical]
                          product:
                              type: string
                              enum:
                                  [
                                      medicalife_familiar_ejecutivo,
                                      medicalife_familiar_mas,
                                      medicalife_familiar_basico,
                                      medicalife_familiar_practico,
                                      medicalife_familiar_conversion,
                                      primordial,
                                      metalife_mujer,
                                      metalife_tu_futuro,
                                      metalife_educacion,
                                      metalife_retiro,
                                      perfeclife,
                                      tempolife,
                                      totalife,
                                      horizonte,
                                      flexilife_inversion,
                                      flexilife_suenos,
                                      educalife,
                                      tempolife_grandes_sumas,
                                      tempolife_preferente,
                                      met4u,
                                  ]
                          payment_frequency:
                              type: string
                              enum:
                                  [
                                      annual,
                                      semiannual,
                                      quarterly,
                                      bimonthly,
                                      monthly,
                                  ]
                          payment_method: string
                          basic_premium: float
                          additional_premium: float (nullable)
                          created_at: string (datetime)
                          policy_created:
                              type: boolean
                              description: "True if Operations has already converted this application into a policy."
                          application_public_id:
                              type: string
                              format: uuid
                              description: |
                                  UUID of the application. Use this as the {id} path parameter to access the
                                  application chat (GET /api/applications/{id}/chat/ws,
                                  GET /api/applications/{id}/chat/messages, etc.). The chat is available from
                                  the moment the application is created and stays writable regardless of the
                                  policy status.
                          policy_public_id:
                              type: string
                              nullable: true
                              format: uuid
                              description: "UUID of the policy created from this application. Null when policy_created is false."
                          policy_status:
                              type: string
                              nullable: true
                              enum: [pending, in_emission, suspended, not_taken, issued]
                              description: "Status of the policy created from this application. Null when policy_created is false."

/api/policy/{id}/receipts:
    permissions: [auth, billing, business_intelligence, super_admin]
    request:
        method: GET
        description: "Returns the full policy plus its coverage terms (year-1 and each renewal), with every receipt grouped under the term that produced it. Internal/audit fields (creator, created_at/updated_at/deleted_at, application_id) are intentionally omitted."
    responses:
        200:
            - contentType: application/json
              reason: "Returns the policy's identity fields plus an ordered list of terms (year-1 first, then renewals), each carrying its mutable data and its receipts."
              body:
                  policy:
                      description: "Fields that stay constant across renewals."
                      id: string (uuid)
                      status:
                          type: string
                          enum: [pending, in_emission, suspended, not_taken, issued]
                      policy_number: integer (nullable)
                      application_folio: string
                      contractor_first_name: string
                      contractor_second_name: string (nullable)
                      contractor_paternal_last_name: string
                      contractor_maternal_last_name: string
                      contractor_rfc: string
                      contractor_email: string
                      contractor_phone: string
                      contractor_secondary_phone: string (nullable)
                      print_policy: boolean
                      insurance_branch:
                          type: string
                          enum: [life, major_medical]
                      product: string
                      issue_date: string (YYYY-MM-DD, nullable)
                  terms:
                      type: array
                      description: "One entry per coverage term, ordered year-1 first then renewals by renewal_number ascending."
                      items:
                          renewal_id:
                              type: string
                              format: uuid
                              nullable: true
                              description: "null for the original year-1 term; the renewal UUID for renewals — pass it to PATCH /api/policy/{id}/renewal/{renewalId}."
                          renewal_number:
                              type: integer
                              nullable: true
                              description: "null for the original year-1 term; renewal number (2, 3, ...) for renewals."
                          new_policy_number:
                              type: string
                              nullable: true
                              description: "null for year-1; the renewal's policy number when it changed (major_medical)."
                          advisor_id: string (uuid)
                          advisor_name: string
                          advisor_key: integer (nullable)
                          advisor_status: string (nullable) — advisor lifecycle status (active | inactive | pre_connected | connected) for this term's advisor.
                          team_leader_id: string (uuid, nullable) — this term's advisor's team leader, or null.
                          team_leader_name: string (nullable)
                          inc_sum_assured: boolean
                          multiple_insured: boolean
                          payment_frequency:
                              type: string
                              enum: [annual, semiannual, quarterly, bimonthly, monthly]
                          payment_method: string
                          payment_channel:
                              type: string
                              enum: [automatic, direct]
                          direct_debit: boolean
                          pca: float
                          validity_start: string (YYYY-MM-DD, nullable for the year-1 term)
                          validity_end: string (YYYY-MM-DD, nullable for the year-1 term)
                          annual_basic_premium: float
                          annual_additional_premium: float
                          annual_net_premium: float
                          receipts:
                              type: array
                              description: "Receipts generated by this term, ordered by id."
                              items:
                                  id: { type: string, format: uuid }
                                  status:
                                      type: string
                                      enum: [paid, cancelled, not_paid_yet]
                                  pca_acreditable:
                                      type: decimal
                                      description: "PCA credited for this receipt. Set at generation to the term's annual net premium (PNA) split evenly across receipts (e.g. a 12k PNA paid monthly yields 1k per receipt); editable via PATCH /api/receipt/{id}."
                                  client_payment_date: string (YYYY-MM-DD, nullable)
                                  real_payment_date: string (YYYY-MM-DD, nullable)
                                  advisor_credited_date: string (YYYY-MM-DD, nullable)
                                  promotoria_month: string (YYYY-MM-DD, nullable)
                                  comments: string (nullable)
                                  valid_from:
                                      type: string
                                      format: YYYY-MM-DD
                                      description: "Start of the period this receipt is valid for. Derived server-side at creation from the policy issue date (year 1) or the renewal validity start; editable via PATCH /api/receipt/{id}."
                                  valid_until:
                                      type: string
                                      format: YYYY-MM-DD
                                      description: "End of the period this receipt is valid for."
        404:
            - reason: "Policy not found or has been deleted."

/api/receipt/{id}:
    permissions: [auth, billing]
    request:
        method: PATCH
        description: |
            Updates a single receipt's fields. All fields are optional. A reason is always required.
            Editing pca_acreditable cascades the new amount to every later receipt of the same term
            (year-1 or renewal); earlier receipts are left untouched. Editing valid_from/valid_until
            likewise cascades the shifted window to the later receipts of the term.
        body:
            reason:
                required: true
                type: string
                description: "Audit reason (max 255 chars)."
            status:
                required: false
                type: string
                enum: [paid, cancelled, not_paid_yet]
            pca_acreditable:
                required: false
                type: float
                description: "New PCA credited for this receipt. Cascades to every later receipt of the same term."
            client_payment_date:
                {
                    required: false,
                    type: string,
                    format: YYYY-MM-DD,
                    description: "Send empty string to clear.",
                }
            real_payment_date:
                {
                    required: false,
                    type: string,
                    format: YYYY-MM-DD,
                    description: "Send empty string to clear.",
                }
            advisor_credited_date:
                {
                    required: false,
                    type: string,
                    format: YYYY-MM-DD,
                    description: "Send empty string to clear.",
                }
            promotoria_month:
                {
                    required: false,
                    type: string,
                    format: YYYY-MM-DD,
                    description: "Send empty string to clear.",
                }
            comments:
                {
                    required: false,
                    type: string,
                    description: "Send empty string to clear.",
                }
            valid_from:
                required: false
                type: string
                format: YYYY-MM-DD
                description: |
                    Start of the receipt's validity window. Editing it (or valid_until) cascades to all later
                    receipts in the same policy-year — each is shifted forward by one payment period, preserving
                    the day pattern set here; earlier receipts are untouched. Any policy-year is editable,
                    including past years and renewals that have not started yet.
            valid_until:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "End of the receipt's validity window. Must be after valid_from."
    responses:
        200:
            - contentType: application/json
              reason: "Receipt updated successfully."
              body: { "status": "success" }
        404:
            - reason: "Receipt not found."
        422:
            - contentType: application/json
              reason: |
                  Validation failed or no changes detected.
                  If no fields differ: { "error": "no_changes" }.
                  Otherwise: { "errors": { "field_name": "error_code" } }.
                  - reason: required, too_long
                  - status: invalid (not in enum)
                  - valid_from / valid_until: invalid (unparseable date, or valid_until not after valid_from)
              body:
                  errors: object

/api/policy/{id}/renewal:
    permissions: [auth, billing]
    request:
        method: POST
        description: |
            Creates a new renewal for an issued policy. All body fields are optional — if omitted,
            the value is inherited from the current policy data. Validity dates default to the next
            annual period (validity_end of current → validity_end + 1 year). PCA is auto-calculated
            from annual_net_premium / receipts_count if not provided. Receipts are generated automatically.
        body:
            advisor_id:
                required: false
                type: string
                format: uuid
                description: "Overrides the advisor. Must be a valid, non-deleted user UUID."
            inc_sum_assured: { required: false, type: boolean }
            multiple_insured: { required: false, type: boolean }
            payment_frequency:
                required: false
                type: string
                enum: [annual, semiannual, quarterly, bimonthly, monthly]
            payment_method:
                required: false
                type: string
                description: |
                    Direct channel: call_center, next_pay, portal, spei, bank_teller, codi.
                    Automatic channel: clabe, amex, credit_card, debit_card, portal_msi, next_pay_msi.
            direct_debit:
                required: false
                type: boolean
                description: "Must be false when the effective payment_channel is 'direct'."
            pca:
                required: false
                type: float
                description: "If omitted or <= 0, auto-calculated as annual_net_premium / receipts_count(payment_frequency)."
            validity_start:
                { required: false, type: string, format: YYYY-MM-DD }
            validity_end:
                required: false
                type: string
                format: YYYY-MM-DD
                description: "Must be strictly after validity_start."
            annual_basic_premium: { required: false, type: float }
            annual_additional_premium: { required: false, type: float }
            annual_net_premium: { required: false, type: float }
            new_policy_number:
                required: conditional
                type: string
                description: "Required (non-empty) when the policy's insurance_branch is 'major_medical'."
    responses:
        201:
            - contentType: application/json
              reason: "Renewal created and receipts generated."
              body:
                  renewal_id: string (uuid)
                  renewal_number: integer
        404:
            - reason: "Policy not found or has been deleted."
        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible field errors:
                  - policy: not_issued (policy status is not 'issued')
                  - policy: unpaid_receipts (the policy still has receipts that are not 'paid')
                  - payment_frequency: invalid
                  - payment_method: invalid
                  - direct_debit: invalid (true when payment_channel is 'direct')
                  - validity_start: invalid (bad date format)
                  - validity_end: invalid (bad date format or not after validity_start)
                  - new_policy_number: required (for major_medical policies)
                  - advisor_id: invalid (bad UUID or user not found)
              body:
                  errors: object

/api/policy/{id}/renewal/{renewalId}:
    permissions: [auth, billing, business_intelligence]
    request:
        method: PATCH
        description: |
            Edits an existing renewal term. Currently limited to the payment frequency, which Billing
            (cobranza) may change even when the renewal's receipts are already paid. Changing it
            regenerates that renewal's receipts for the new frequency (any prior payment state on the
            renewal is discarded by design). {renewalId} is the renewal UUID exposed as `renewal_id`
            on each term of GET /api/policy/{id}/receipts. A reason is always required.
        body:
            reason:
                required: true
                type: string
                description: "Audit reason (max 255 chars)."
            payment_frequency:
                required: true
                type: string
                enum: [annual, semiannual, quarterly, bimonthly, monthly]
    responses:
        200:
            - contentType: application/json
              reason: "Renewal frequency updated and its receipts regenerated."
              body: { "status": "success" }
        404:
            - reason: "Policy or renewal not found, or the renewal does not belong to the policy."
        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible errors:
                  - reason: required
                  - payment_frequency: invalid
                  - no_changes (payment_frequency omitted or equal to the current one)
              body:
                  errors: object

/api/billing/export:
    permissions: [auth, billing, business_intelligence]
    request:
        method: POST
        description: |
            Exports policies and their receipts to an .xlsx spreadsheet. One row per receipt,
            flattened with its policy identity and the term that produced it (year-1 fields come
            from the policy, renewal fields from the renewal). All filters are optional — an empty
            filter set exports everything. At least one column must be requested. A reason is always
            required and, together with the applied filters/columns, the row count and the operator,
            is recorded in billing_export_log for auditing (who / what / when / why).

            The BusinessIntelligence role gets an anonymous export: requesting any client-identifying
            column (contractor_name, contractor_email, contractor_phones) -> 422 (columns: invalid).
            Billing is unrestricted.

            All filter values are validated and bound as parameters; any invalid value -> 400 invalid_filter.
        body:
            reason:
                required: true
                type: string
                description: "Audit reason for the export (max 255 chars)."
            columns:
                required: true
                type: array
                items: string
                description: |
                    At least one column key. Allowed keys (output column order follows the array):
                    policy_number, contractor_name, contractor_email, contractor_phones, advisor,
                    branch, product, policy_status, receipt_number, receipt_status, sale_type,
                    policy_pca, pca, pna, payment_frequency, payment_method, payment_channel,
                    real_payment_date, advisor_credited_date, promotoria_month, valid_from, valid_until.
                    An unknown key -> 422 (columns: invalid). receipt_number is the receipt's ordinal
                    (1..N) within its term; sale_type is "Renovación" when the receipt belongs to a
                    renewal term or "Primer año" for the original year-1 term; policy_pca is the term's
                    pca (the policy/renewal commissionable premium); pca is the receipt's pca_acreditable;
                    pna is the term's annual_net_premium.
            issue_from: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by policy issue_date (inclusive lower bound)." }
            issue_to: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by policy issue_date (inclusive upper bound)." }
            payment_from: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt real_payment_date (inclusive lower bound)." }
            payment_to: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt real_payment_date (inclusive upper bound)." }
            advisor_credited_from: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt advisor_credited_date (inclusive lower bound)." }
            advisor_credited_to: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt advisor_credited_date (inclusive upper bound)." }
            promotoria_from: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt promotoria_month (inclusive lower bound)." }
            promotoria_to: { required: false, type: string, format: YYYY-MM-DD, description: "Filter by receipt promotoria_month (inclusive upper bound)." }
            advisors:
                required: false
                type: array
                items: string (uuid)
                description: "Filter to these advisor public UUIDs (see GET /api/advisors). Any malformed UUID -> 400 invalid_filter."
            branch:
                required: false
                type: string
                enum: [life, major_medical]
                description: "Filter by ramo (life = Vida, major_medical = GMM)."
            receipt_statuses:
                required: false
                type: array
                items: string
                description: "Filter by receipt status. Allowed: paid, cancelled, not_paid_yet."
            policy_statuses:
                required: false
                type: array
                items: string
                description: "Filter by policy status. Allowed: pending, in_emission, suspended, not_taken, issued."
    responses:
        200:
            - contentType: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
              reason: "The .xlsx file, served as an attachment (filename policies_receipts_export.xlsx)."
        400:
            - contentType: application/json
              reason: "A filter carries an invalid value (bad date, malformed advisor UUID, or unknown branch/status)."
              body: { "error": "invalid_filter" }
        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible field errors:
                  - reason: required, too_long
                  - columns: required (empty), invalid (unknown column key)
              body:
                  errors: object

/api/applications/{id}/chat/messages:
    # Casbin allows the roles below, but the handler further restricts access to the
    # application's creator or any user with the Operations role; anyone else gets 404.
    # The chat is available as soon as the application exists and stays writable
    # regardless of the policy status.
    permissions: [auth, super_admin, team_leader, advisor, operations]
    request:
        method: GET
        description: |
            Returns the full chat history for an application (path {id} is the application
            public UUID) in chronological order, oldest first. The response is NOT paginated.
            Each message is either kind 'text' (body set) or kind 'pdf' (file metadata set).
            The 'id' field is present only on 'pdf' messages, where the client needs it to
            fetch the file via GET /api/applications/{id}/chat/messages/{msg_id}/file.
    responses:
        200:
            - contentType: application/json
              reason: "Returns the chat history."
              body:
                  messages:
                      type: array
                      items:
                          id: string (uuid) — present only for 'pdf' messages
                          kind:
                              type: string
                              enum: [text, pdf]
                          body: string (nullable)
                          original_filename: string (nullable)
                          size_bytes: integer (nullable)
                          sender:
                              id: string (uuid)
                              name: string
                          created_at: string (datetime)
        404:
            - reason: "Application not found, or the caller is neither its creator nor an Operations user."

/api/applications/{id}/chat/files:
    # Restricted to the application's creator or any Operations user.
    permissions: [auth, super_admin, team_leader, advisor, operations]
    request:
        method: POST
        contentType: multipart/form-data
        description: |
            Uploads a single PDF into the application chat and creates a 'pdf' message
            (path {id} is the application public UUID). The max body size for this route is
            25 MiB (overrides the global 5 MiB cap). The MIME type is sniffed from the file's
            contents; only application/pdf is accepted. The new message is broadcast over the
            WebSocket to the other participant — the uploader is NOT echoed.
            The chat is always writable regardless of the policy status.
        body:
            file:
                required: true
                type: file (binary)
                description: "The PDF to upload. Must sniff as application/pdf and be <= 25 MiB."
    responses:
        201:
            - contentType: application/json
              reason: "File uploaded and chat message created."
              body:
                  message:
                      id: string (uuid)
                      kind: "pdf"
                      body: "null"
                      original_filename: string
                      size_bytes: integer
                      sender:
                          id: string (uuid)
                          name: string
                      created_at: string (datetime)
        404:
            - reason: "Application not found, or the caller is not authorized."
        413:
            - contentType: text/plain
              reason: "The uploaded file exceeds 25 MiB."
        422:
            - contentType: application/json
              reason: |
                  Validation failed. Possible field errors:
                  - file: required (no file part), invalid_mime_type (not a PDF)
              body:
                  errors: object

/api/applications/{id}/chat/messages/{msg_id}/file:
    # Restricted to the application's creator or any Operations user (others get 404).
    permissions: [auth, super_admin, team_leader, advisor, operations]
    request:
        method: GET
        description: |
            Streams the raw PDF bytes for a 'pdf' chat message ({id} = application UUID,
            {msg_id} = chat message UUID). Served through the server so authorization is
            enforced on every fetch.
    responses:
        200:
            - contentType: application/pdf
              reason: |
                  Streams the file. Content-Disposition is 'attachment' with the sanitized
                  original filename; cached privately for 60 seconds.
        404:
            - reason: "Application/message not found, message is not a 'pdf', deleted, or caller not authorized."

/api/applications/{id}/chat/ws:
    # Restricted to the application's creator or any Operations user (others get 404).
    # The chat is always writable regardless of the policy status.
    permissions: [auth, super_admin, team_leader, advisor, operations]
    request:
        method: GET
        description: |
            Upgrades the connection to a WebSocket for real-time application chat
            (path {id} is the application public UUID). Because browsers cannot set custom
            headers on a WebSocket handshake, authentication uses the session token in the
            query string (?t=<token>) instead of the Authorization header.

            Client -> server frames (JSON): { "kind": "text", "body": "<= 4000 chars" }.
            Non-text frames and empty or oversized bodies are silently ignored. PDFs are NOT
            sent over the socket — upload them via POST /api/applications/{id}/chat/files.

            Server -> client frames (JSON): a chat message object (same shape as the chat
            history items). Text messages carry no 'id'; 'pdf' messages carry 'id' so the file
            can be fetched. The author never receives an echo of their own message.

            Only allowlisted origins are accepted: vigvita.com.mx (and www), plus localhost
            for development. Any other origin — or a request with no Origin header
            (non-browser clients) — is rejected at the handshake with 403.
        query:
            t:
                required: true
                type: string
                description: "Session token (same value used as a Bearer token)."
    responses:
        101:
            - reason: "Switching Protocols — WebSocket connection established."
        403:
            - reason: "Origin not allowed (cross-origin, or a non-browser client with no Origin header)."
        404:
            - reason: "Missing/invalid token, application not found, or caller not authorized."
