global_specs:
  scope: "/*"

  constraints:
    max_body_size: 5mb
    max_header_size: 1mb
    timeout:
      read: 5s
      read_headers: 5s
      write: 5s
      idle: 60s

    on_request_limit_exceeded:
      action: "Connection Termination"
      description: "The server will forcefully close the TCP connection to prevent resource exhaustion."

  # Standard responses for any endpoint
  default_responses:
    500:
      contentType: text/plain
      body: "Internal server error"
      reason: "Unexpected server-side failure"

global_post_specs:
  scope: "POST /*"

  # Standar requirements for any POST endpoint
  request:
    contentType: application/json

  # Standard responses for any POST endpoint
  response:
    400:
      - contentType: text/plain
        body: Bad Request
        reason: The HTTP request body is malformed or cannot be parsed

    422:
      - contentType: application/json
        reason: |
			The JSON is well-formed but cannot be processed. This includes invalid data types (e.g., sending an integer instead of a string)
			or business validation failures (e.g., invalid email format, missing required fields).
        body: { "errors": { "field_name": "error_slug" } }

permissions:
  auth:
    description: "Verifies user session using Authorization (Bearer <token>) header or (session) cookie."
    on_failure:
      status: 404
      contentType: "text/html"

  super_admin:
    description: "Restricts access to users with the SuperAdmin role."
    on_failure:
      status: 404
      contentType: "text/html"

  human_resources:
    description: "Restricts access to users with the HumanResources role."
    on_failure:
      status: 404
      contentType: "text/html"

  team_leader:
    description: "Restricts access to users with the TeamLeader role."
    on_failure:
      status: 404
      contentType: "text/html"

  advisor:
    description: "Restricts access to users with the Advisor role."
    on_failure:
      status: 404
      contentType: "text/html"

  operations:
    description: "Restricts access to users with the Operations role."
    on_failure:
      status: 404
      contentType: "text/html"

  billing:
    description: "Restricts access to users with the Billing role."
    on_failure:
      status: 404
      contentType: "text/html"

roles:
  description: "Application roles available to the frontend. Returned as the 'role' field on user objects."
  values:
    SuperAdmin:
      description: "Full system access. Manages users, roles, and global configuration."
    TeamLeader:
      description: "Manages a team of advisors. Can view and manage their team's client profiles."
    Advisor:
      description: "Front-line sales role. Creates and manages client profiles (ADNs) and policy applications."
    Advisor_Trainee:
      description: "Trainee version of Advisor. Limited access while in training."
    HumanResources:
      description: "HR department role. Can update user names and advisor details (key, status, month zero). All changes are audit-logged."
    Operations:
      description: "Policy administration role. Converts applications into policies and manages their status lifecycle."
    Billing:
      description: "Collections and finance role. Views and edits all policy receipts, and creates policy renewals."

/api/signup:
  request:
    method: POST
    body:
      name:
        required: true
        min: 5
        max: 255
      email:
        required: true
        max: 255
      password:
        required: true
        min: 8
        max: 255
      token:
        required: true

  responses:
    201:
      - contentType: application/json
        reason: User created successfully and invitation marked as used
        body: { "status": "success" }

    403:
      - contentType: application/json
        reason: The token hash does not match any active invitation or is already accepted/expired
        body: {"error": "invalid_token"}

      - contentType: application/json
        reason: The provided email does not match the email associated with the token
        body: {"error": "email_mismatch"}

    422:
      - contentType: application/json
        reason: One or more fields failed format validation (email format, password length, etc)
        body: { "errors": { "field_name": "error_slug" } }

/api/login:
  request:
    method: POST
    query:
      api:
        required: false
        type: boolean
        description: "If set to 'true', injects additional app-specific metadata into the response such as 'training' and 'is_leader'."
    body:
      email:
        required: true
      password:
        required: true

  responses:
    200:
      - contentType: application/json
        reason: Credentials verified and session created
        body:
          token: string
          name:
            type: string
            description: User's full name.
          redirect:
            type: string
            description: |
              The URL to which the server determines the user must be redirected
              based on their assigned role (e.g., /coming-soon, /admin/dashboard).
          training:
            type: boolean
            required: false
            description: |
              This property will ONLY be injected (when ?api=true) and be exclusively true if the authenticated user
              holds the Advisor_Trainee role. Indicates learning limitations in place.
          is_leader:
            type: boolean
            required: false
            description: |
              This property will ONLY be injected (when ?api=true) and be exclusively true if the authenticated user
              holds the TeamLeader or SuperAdmin role. Used by the desktop app to toggle leader-specific menus.

    401:
      - contentType: application/json
        reason: "The email doesn't exist or the password is incorrect"
        body: { "error": "invalid_credentials" }

    403:
      - contentType: application/json
        reason: "The user's access period (employment_period) has expired"
        body: { "error": "employment_period_ended" }

    422:
      - contentType: application/json
        reason: "Required fields are missing or empty"
        body: { "error": "missing_required_fields" }

/api/user:
  permissions: [auth, super_admin]

  request:
    method: POST
    body:
      email:
        required: true
      role:
        required: true
        type: string
        description: "Must match a valid system role (e.g., SuperAdmin, TeamLeader, Advisor, AdvisorTrainee)"
      leader:
        required: false
        type: string
        description: "Email of an existing and active user"

  responses:
    201:
      - contentType: application/json
        reason: Invitation created successfully and token generated
        body: { "status": "success" }

    400:
      - contentType: application/json
        reason: The provided leader email does not exist
        body: { "error": "invalid_leader" }

    422:
      - contentType: application/json
        reason: Email format is invalid or the role does not exist in the system
        body: { "errors": { "field_name": "error_slug" } }

/api/forgot-password:
  request:
    method: POST
    body:
      email:
        required: true
        type: string
        description: "The user's registered email address."

  responses:
    200:
      - contentType: application/json
        reason: |
          Request received. To prevent email enumeration, this endpoint returns
          a success message regardless of whether the email exists in the system or not.
        body: { "status": "success" }

/api/dashboard-global:
  permissions: [auth, super_admin]

  request:
    method: GET
    query:
      preset:
        required: true
        type: string
        enum: [week, month, q1, q2, q3, q4, last_6_months, year, custom]
        description: |
          Date range preset:
          - week: Monday of the current week → end of today.
          - month: 1st of the current month → end of today.
          - q1: Jan 1 – Mar 31 of the current year.
          - q2: Apr 1 – Jun 30 of the current year.
          - q3: Jul 1 – Sep 30 of the current year.
          - q4: Oct 1 – Dec 31 of the current year.
          Selecting a future quarter returns 422. If the quarter is in progress, end date is capped to today.
          - last_6_months: 1st of the month 5 months ago → end of today (grouped monthly).
          - year: Jan 1 of the current year → end of today.
          - custom: Uses start_date and end_date. End date is capped to today if in the future.
      start_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Only required when preset is 'custom'. Must be on or after 2026-01-01."
      end_date:
        required: conditional
        type: string
        format: YYYY-MM-DD
        description: "Only required when preset is 'custom'. Must be on or after 2026-01-01, >= start_date. If in the future, it is silently capped to today."

  responses:
    200:
      - contentType: application/json
        reason: "Returns global dashboard statistics, KPIs, and charts properly aggregated."
        body:
          kpis:
            total_profiles:
              type: integer
              example: 100
            closed:
              type: integer
              example: 40
            in_process:
              type: integer
              example: 60
            cancelled:
              type: integer
              example: 5
            effectiveness:
              type: float
              example: 40.0
            total_referrals:
              type: integer
              example: 20
            referrals_per_closed:
              type: float
              example: 0.5
            unaccompanied:
              type: integer
              description: "Profiles created with accompaniment_status 'unaccompanied' (Sin acompañamiento)."
              example: 50
            demonstration:
              type: integer
              description: "Profiles created with accompaniment_status 'demonstration' (Demostración)."
              example: 30
            observation:
              type: integer
              description: "Profiles created with accompaniment_status 'observation' (Observación)."
              example: 20
          timeline_array:
            type: array
            items:
              date:
                type: string
                description: "Format depends on date range duration (e.g. '02 Jan' for <= 32 days or 'Jan 2006' for > 32 days)"
                example: "01 Jan"
              created:
                type: integer
                example: 10
              closed:
                type: integer
                example: 4
          chart_data_pie:
            type: array
            items:
              name:
                type: string
                description: "Either 'Closed', 'Pending', or 'Cancelled'"
                example: "Closed"
              value:
                type: integer
                example: 40
          top_generated:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              generated:
                type: integer
                example: 30
          top_closed:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              closed:
                type: integer
                example: 15
          top_referrals:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              referrals:
                type: integer
                example: 5
          advisors:
            type: array
            items:
              name:
                type: string
                example: "Advisor 1"
              id:
                type: UUID

    422:
      - contentType: application/json
        reason: "Invalid date presets or error parsing custom start/end dates."
        body:
        error: "Invalid dates"

/api/profiles/new:
  permissions: [auth, super_admin, team_leader, advisor]
  request:
    method: POST
    body:
      clients:
        type: array
        description: "A list of client objects to be created. Minimum of 1 client."
        items:
          id:
            required: false
            description: |
              When sent, it must be a valid UUID representing the profile ID to be updated;
              if it is not included or does not match an existing profile, a new profile will be created and the provided UUID will be ignored
          advisor_id:
            required: false
            type: string
            format: uuid
            description: |
              When optionally sent, specifies the exact UUID of an existing advisor that this ADN should be attributed to.
              A strictly enforced authorization check verifies whether the current logged-in user possesses leadership over the matching target advisor_id.
          name:
            required: true
            type: string
            description: "The name of the client. Must be between 1 and 100 characters."
            example: "Juan Pérez"
          created_at:
            required: false
            type: string
            format: date-time
            description: "Timestampt of creation (if not provided, it will be mapped correctly at insertion to server's time)."
            example: "2026-03-10T15:00:00Z"
          is_closed:
            required: false
            type: boolean
            description: "Whether the profile was closed."
            example: false
          acquisition_status:
            required: true
            type: string
            description: "Current status of the profile acquisition. Must be one of: 'pending', 'cancelled', 'completed'."
            example: "pending"
          accompaniment_status:
            required: true
            type: string
            enum: [unaccompanied, demonstration, observation]
            description: |
              How the advisor handled the profile during creation. Required.
              Feeds the global and per-advisor dashboard breakdowns.
              Values: 'unaccompanied', 'demonstration', 'observation'.
            example: "unaccompanied"
          closing_types:
            required: false
            type: array
            items:
              type: string
            description: "Types of policies or plans closed for this client."
          data:
            required: false
            type: object
            description: "Detailed client data payload including Profile, Referrals, Assets, Insurance, etc. Stored encrypted in the database."
            $ref: '#/components/schemas/ClientData'

  responses:
    201:
      - contentType: application/json
        reason: "Client profiles created successfully."
        body:
          data:
            type: array
            description: "Returns an array containing the UUIDs generated for the NEWLY inserted clients."
            items:
              type: string
              format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
    403:
      - contentType: application/json
        reason: "The authenticated user is not authorized to attribute the ADN to the requested advisor_id."
        body: { "error": "not_authorized_for_advisor" }
    404:
      - contentType: application/json
        reason: "One or more of the specified advisor_ids could not be found."
        body: { "error": "some_advisors_not_found" }
    422:
      - contentType: application/json
        reason: "Validation error. Client name is missing, name exceeds 100 characters, classification exceeds 50 characters, acquisition status is not within the valid enum, or accompaniment status is missing or not within the valid enum."
        body:
          errors:
            "clients[0].name": "required|too_long"
            "clients[0].acquisition_status": "invalid"
            "clients[0].accompaniment_status": "required|invalid"

      - contentType: application/json
        reason: "No clients sent."
        body:
          errors:
            "clients": "required"

/api/hr/users:
  permissions: [auth, human_resources]

  request:
    method: GET

  response:
    200:
      - contentType: application/json
        reason: "Returns a list of all users that HumanResources is allowed to edit (Advisor, Advisor_Trainee, TeamLeader, SuperAdmin) along with their advisor details if applicable."
        body:
          users:
            - id: "uuid-string"
              name: "Juan Perez"
              advisor_key: 12345
              status: "active"
              month_zero: "2026-05-01" | null

/api/hr/advisor/{id}:
  permissions: [auth, human_resources]

  request:
    method: PATCH
    body:
      advisor_key:
        required: false
        type: integer
        description: "Must be greater than 0."
      status:
        required: false
        type: string
        enum: [active, inactive, pre_connected, connected]
      month_zero:
        required: false
        type: string
        format: "YYYY-MM-DD"
        description: "The advisor's starting month. Send null or empty string to clear."
      reason:
        required: true
        type: string
        max: 255
        description: "Brief explanation of why the change is being made. Stored in the audit log."

  response:
    200:
      - contentType: application/json
        reason: "Advisor details updated. Each changed field is recorded in the advisor_change_log with old/new value and reason. Applies to users with roles: Advisor, Advisor_Trainee, TeamLeader, SuperAdmin."
        body:
          status: "success"
    404:
      - contentType: text/plain
        reason: "Target user not found, deleted, or does not have an eligible role (Advisor, Advisor_Trainee, TeamLeader, SuperAdmin)."
    422:
      - contentType: application/json
        reason: |
          Validation failed. Possible field errors:
          - reason: required, too_long
          - body: at_least_one_field_required (none of advisor_key, status, or month_zero was provided)
          - status: invalid (not in enum)
          - advisor_key: invalid (<= 0)
          - month_zero: invalid (bad date format)
        body:
          errors: object

/api/profiles:
  permissions: [auth, super_admin, team_leader, advisor]

  request:
    method: GET

  response:
    200:
      - contentType: application/json
        reason: "Returns a summary list of all ADNs (Client Profiles) where the authenticated user is involved either as the assigned advisor or as the creator."
        body:
          profiles:
            - id: "uuid-string"
              client_name: "Juan Perez"
              status: "pending"
              accompaniment_status:
                type: string
                enum: [unaccompanied, demonstration, observation]
                description: "How the advisor handled the profile during creation."
                example: "unaccompanied"
              created_at: "2026-04-22T00:00:00Z"
              needs_resync:
                type: boolean
                description: "If true, the server's encrypted data for this profile is corrupted or missing. The client should NOT delete local data and must re-send the profile to restore it."
                example: false
              referrals:
                type: array
                items:
                  $ref: '#/components/schemas/Referral'
              relationship:
                created_by: "Name of the creator (if created by a leader for this advisor)"
                created_for: "Name of the advisor (if created by this leader for an advisor)"

/api/profiles/{id}:
  permissions: [auth, super_admin, team_leader, advisor]

  request:
    method: GET

  response:
    200:
      - contentType: application/json
        reason: "Returns a single client profile with its full decrypted data payload."
        body:
          id: "uuid-string"
          client_name: "Juan Perez"
          status: "pending"
          accompaniment_status:
            type: string
            enum: [unaccompanied, demonstration, observation]
            description: "How the advisor handled the profile during creation."
            example: "unaccompanied"
          created_at: "2026-04-22T00:00:00Z"
          needs_resync:
            type: boolean
            description: "If true, the server's encrypted data for this profile is corrupted or missing. The client should NOT delete local data and must re-send the profile to restore it."
            example: false
          relationship:
            created_by: "Name of the creator (if created by a leader for this advisor)"
            created_for: "Name of the advisor (if created by this leader for an advisor)"
          data:
            $ref: '#/components/schemas/ClientData'
    404:
      - contentType: text/plain
        reason: "Profile not found or not accessible by the user."

  delete:
    method: DELETE
    permissions: [auth, super_admin, team_leader, advisor]

    response:
      200:
        - contentType: application/json
          reason: "Profile deleted successfully (soft delete)."
          body:
            message: "Profile deleted successfully"
      404:
        - contentType: text/plain
          reason: "Profile not found or not accessible by the user."

